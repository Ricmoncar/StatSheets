<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STATSHEETS — ENCYCLOPÆDIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css?v=3"/>
<style>

/* ============================================================
   KEYFRAME ANIMATIONS
   ============================================================ */
@keyframes enc-anim-fade {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes enc-next {
  0%   { opacity:1; transform:translateX(0) scale(1); }
  35%  { opacity:0; transform:translateX(-18px) scale(0.98); }
  65%  { opacity:0; transform:translateX(18px) scale(0.98); }
  100% { opacity:1; transform:translateX(0) scale(1); }
}
@keyframes enc-prev {
  0%   { opacity:1; transform:translateX(0) scale(1); }
  35%  { opacity:0; transform:translateX(18px) scale(0.98); }
  65%  { opacity:0; transform:translateX(-18px) scale(0.98); }
  100% { opacity:1; transform:translateX(0) scale(1); }
}
@keyframes enc-stat-fill {
  from { width: 0%; }
}
@keyframes enc-shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes enc-pulse-glow {
  0%, 100% { opacity: 0.5; }
  50%      { opacity: 1; }
}
@keyframes enc-orb-pulse {
  0%, 100% { box-shadow: 0 0 16px var(--status-col, #888), 0 0 32px var(--status-col, #88888844); }
  50%      { box-shadow: 0 0 24px var(--status-col, #888), 0 0 48px var(--status-col, #88888866); }
}
@keyframes enc-float-in {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes enc-star-pop {
  0%   { transform: scale(0.3); opacity:0; }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); opacity:1; }
}
@keyframes enc-text-glow {
  0%, 100% { text-shadow: 0 0 8px currentColor; }
  50%      { text-shadow: 0 0 18px currentColor, 0 0 4px currentColor; }
}

.enc-anim-fade {
  opacity: 0;
  animation: enc-anim-fade 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
}
.enc-anim-next { animation: enc-next 0.35s cubic-bezier(0.4,0,0.2,1) both; }
.enc-anim-prev { animation: enc-prev 0.35s cubic-bezier(0.4,0,0.2,1) both; }

/* ============================================================
   BASE
   ============================================================ */
body {
  background: #060402;
  padding: 0;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  overflow: hidden;
}

/* ── Masthead ── */
#enc-masthead {
  display: flex;
  align-items: center;
  padding: 14px 24px 10px;
  flex-shrink: 0;
  gap: 18px;
  border-bottom: 1px solid #1a1005;
  background: linear-gradient(180deg, #0a0804 0%, #060402 100%);
  position: relative;
  z-index: 2;
}
#enc-title-block { flex: 1; text-align: center; }
.enc-main-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(18px, 2.8vw, 28px);
  color: #c9a227;
  letter-spacing: 8px;
  text-shadow: 0 0 30px rgba(201,162,39,0.45), 0 0 80px rgba(201,162,39,0.15), 0 2px 4px rgba(0,0,0,0.5);
  line-height: 1.3;
  animation: enc-anim-fade 0.6s ease-out both;
}
.enc-main-sub {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  color: #6a4a20;
  letter-spacing: 8px;
  margin-top: 4px;
  animation: enc-anim-fade 0.6s 0.1s ease-out both;
}
.enc-masthead-deco {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 5px;
  animation: enc-anim-fade 0.5s 0.2s ease-out both;
}
.enc-masthead-deco-line {
  height: 1px;
  width: 70px;
  background: linear-gradient(to right, transparent, #5a3a18);
}
.enc-masthead-deco-line.r { background: linear-gradient(to left, transparent, #5a3a18); }
.enc-masthead-deco-gem { font-size: 8px; color: #5a3a18; animation: enc-pulse-glow 3s infinite ease-in-out; }

/* ── Book wrap ── */
#enc-book-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 16px 14px;
  min-height: 0;
}

/* ============================================================
   BOOK
   ============================================================ */
#enc-book {
  display: flex;
  width: min(1300px, 100%);
  height: calc(100vh - 118px);
  min-height: 500px;
  box-shadow:
    0 35px 100px rgba(0,0,0,0.97),
    -12px 5px 30px rgba(0,0,0,0.5),
    12px 5px 30px rgba(0,0,0,0.5),
    0 0 120px rgba(0,0,0,0.3);
  --enc-col: #c9a227;
  animation: enc-float-in 0.5s ease-out;
}

/* ── Left page ── */
#enc-left {
  flex: 0 0 26%;
  min-width: 180px;
  max-width: 300px;
  background: linear-gradient(170deg, #0f0c07 0%, #0c0905 100%);
  border: 1px solid #221608;
  border-right: none;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
/* Stacked pages — left side */
#enc-left::before {
  content: '';
  position: absolute;
  left: -6px; top: 4px; bottom: -4px; width: 6px;
  background: #0a0703;
  border-left: 1px solid #180f03;
  z-index: 0;
}
#enc-left::after {
  content: '';
  position: absolute;
  left: -11px; top: 8px; bottom: -8px; width: 5px;
  background: #060401;
  border-left: 1px solid #100802;
  z-index: 0;
}
#enc-left-hd {
  padding: 18px 18px 12px;
  border-bottom: 1px solid #1c1207;
  flex-shrink: 0;
}
.enc-idx-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(10px, 1.1vw, 14px);
  color: var(--enc-col);
  letter-spacing: 4px;
  margin-bottom: 3px;
  transition: color 0.3s;
}
.enc-idx-sub {
  font-size: 8px;
  color: #5a4020;
  letter-spacing: 3px;
}

#enc-toc {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
#enc-toc::-webkit-scrollbar { width: 3px; }
#enc-toc::-webkit-scrollbar-thumb { background: #2a1808; border-radius: 2px; }

.enc-toc-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
  position: relative;
}
.enc-toc-item:hover {
  background: rgba(255,255,255,0.03);
  transform: translateX(3px);
}
.enc-toc-item.active { background: rgba(255,255,255,0.04); }
.enc-toc-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  width: 22px;
  flex: 1;
}
.enc-toc-item.active .enc-toc-dot {
  opacity: 1;
  box-shadow: 0 0 6px currentColor;
}
.enc-toc-group {
  margin-bottom: 16px;
}
.enc-toc-group-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  width: calc(100% - 24px);
  box-sizing: border-box;
  font-size: 10px;
  letter-spacing: 2px;
  color: #bfa76e;
  margin: 8px 12px 6px;
  padding: 6px 8px;
  border: 1px solid rgba(191,167,110,0.2);
  border-radius: 10px;
  background: rgba(255,255,255,0.02);
  text-transform: uppercase;
  opacity: 0.95;
  cursor: pointer;
  white-space: normal; /* allow wrapping instead of clipping */
  line-height: 1.15;
  word-break: break-word;
}
.enc-toc-group-title span {
  display: inline-flex;
  align-items: center;
}
.enc-toc-group-body {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 40px;
  padding: 6px 10px 10px;
  border-radius: 0 0 14px 14px;
}
.enc-toc-group-body.collapsed {
  display: none;
}
.enc-toc-empty {
  padding: 10px 18px;
  color: #7b6a4f;
  font-size: 9px;
  letter-spacing: 1px;
}
.enc-toc-item.drag-over,
.enc-toc-group-body.drag-over,
.enc-toc-group-title.drag-over {
  background: rgba(255,255,255,0.08);
}
.enc-toc-item.dragging {
  opacity: 0.5;
}

#enc-left-ft {
  padding: 12px 14px;
  border-top: 1px solid #1c1207;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Spine ── */
#enc-spine {
  flex: 0 0 20px;
  background: linear-gradient(to right, #14090302 0%, #1e1108 20%, #2a1a0a 50%, #1e1108 80%, #14090302 100%);
  border-left: 1px solid #281608;
  border-right: 1px solid #281608;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#enc-spine::before, #enc-spine::after {
  content: '';
  position: absolute;
  left: 3px; right: 3px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(201,162,39,0.22), transparent);
}
#enc-spine::before { top: 16px; }
#enc-spine::after  { bottom: 16px; }
.enc-spine-lbl {
  font-family: 'Cinzel', serif;
  font-size: 6px;
  color: rgba(201,162,39,0.2);
  writing-mode: vertical-rl;
  letter-spacing: 6px;
  text-transform: uppercase;
}

/* ── Right page ── */
#enc-right {
  flex: 1;
  background: linear-gradient(170deg, #110e08 0%, #0e0b06 100%);
  border: 1px solid #221608;
  border-left: none;
  display: flex;
  overflow: hidden;
  position: relative;
}
/* Stacked pages — right side */
#enc-right::before {
  content: '';
  position: absolute;
  right: -6px; top: 4px; bottom: -4px; width: 6px;
  background: #0a0703;
  border-right: 1px solid #180f03;
  z-index: 0;
}
#enc-right::after {
  content: '';
  position: absolute;
  right: -11px; top: 8px; bottom: -8px; width: 5px;
  background: #060401;
  border-right: 1px solid #100802;
  z-index: 0;
}

/* ── Content column ── */
#enc-content-col {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#enc-content-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 28px 30px 24px;
  background-image: repeating-linear-gradient(
    transparent, transparent 32px,
    rgba(201,162,39,0.02) 32px,
    rgba(201,162,39,0.02) 33px
  );
  background-attachment: local;
}
#enc-content-scroll::-webkit-scrollbar { width: 4px; }
#enc-content-scroll::-webkit-scrollbar-thumb { background: #221408; border-radius: 2px; }

/* ── Footer nav ── */
#enc-footer-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  border-top: 1px solid #1c1207;
  flex-shrink: 0;
  gap: 10px;
}
.enc-nav-btn {
  font-family: var(--font-main);
  font-size: 9px;
  color: #6a4a28;
  background: transparent;
  border: 1px solid #2a1808;
  padding: 8px 18px;
  cursor: pointer;
  letter-spacing: 1.5px;
  transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
}
.enc-nav-btn:hover:not(:disabled) {
  color: var(--enc-col);
  border-color: var(--enc-col);
  box-shadow: 0 0 12px rgba(201,162,39,0.1);
  transform: translateY(-1px);
}
.enc-nav-btn:disabled { opacity: 0.2; cursor: default; }
#enc-page-info {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  color: #5a4020;
  letter-spacing: 3px;
  text-align: center;
  flex: 1;
  transition: color 0.3s;
}

/* ── Section tabs strip ── */
#enc-tabs-strip {
  flex: 0 0 36px;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #1c1207;
  padding: 20px 0 0;
  gap: 2px;
  background: #0b0905;
  z-index: 1;
}
.enc-tab-btn {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-family: var(--font-main);
  font-size: 6px;
  letter-spacing: 3px;
  padding: 16px 10px;
  cursor: pointer;
  background: transparent;
  border: none;
  border-right: 2px solid transparent;
  color: #4a3018;
  transition: color 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  line-height: 1;
}
.enc-tab-btn:hover {
  color: #8a6a38;
  background: rgba(255,255,255,0.025);
}
.enc-tab-btn.active {
  color: var(--enc-col);
  border-right-color: var(--enc-col);
  background: rgba(255,255,255,0.04);
  box-shadow: inset -4px 0 12px rgba(201,162,39,0.05);
}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.enc-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 60px 24px;
  text-align: center;
  min-height: 240px;
  animation: enc-anim-fade 0.5s ease-out both;
}
.enc-empty-icon {
  font-size: 36px;
  color: #3a2810;
  animation: enc-pulse-glow 2.5s infinite ease-in-out;
}
.enc-empty-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: #6a4a28;
  letter-spacing: 4px;
}
.enc-empty-sub {
  font-size: 9px;
  color: #4a3014;
  letter-spacing: 2px;
}

/* ============================================================
   DECORATIVE HELPERS
   ============================================================ */
.enc-entry-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(16px, 2vw, 24px);
  letter-spacing: 4px;
  margin-bottom: 6px;
  line-height: 1.3;
  transition: text-shadow 0.3s;
}
.enc-entry-name:hover {
  text-shadow: 0 0 24px currentColor;
}
.enc-entry-divider {
  height: 2px;
  margin-bottom: 16px;
  opacity: 0.45;
  border-radius: 1px;
  transition: opacity 0.2s, box-shadow 0.2s;
}
.enc-entry-divider:hover {
  opacity: 0.6;
  box-shadow: 0 0 12px currentColor;
}
.enc-section-label {
  font-size: 9px;
  letter-spacing: 4px;
  border-bottom: 1px solid #2a1808;
  padding-bottom: 7px;
  margin: 20px 0 12px;
  color: inherit;
  opacity: 0.7;
  transition: opacity 0.25s, text-shadow 0.25s;
}
.enc-section-label:hover {
  opacity: 1;
  text-shadow: 0 0 16px currentColor;
}
.enc-body-text {
  font-size: 11px;
  color: #a88a5c;
  line-height: 2;
  letter-spacing: 0.4px;
  font-family: 'Cinzel', serif;
  transition: color 0.25s, text-shadow 0.25s;
}
.enc-body-text:hover {
  color: #c8a878;
  text-shadow: 0 0 14px rgba(200,168,120,0.15);
}
.enc-badge {
  display: inline-block;
  font-size: 8px;
  letter-spacing: 2.5px;
  padding: 5px 12px;
  border: 1px solid;
  transition: transform 0.15s, box-shadow 0.15s;
}
.enc-badge:hover {
  transform: translateY(-2px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  text-shadow: 0 0 8px currentColor;
}
.enc-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.enc-entry-actions {
  display: flex;
  gap: 8px;
  padding-top: 14px;
  border-top: 1px solid #1a1005;
  margin-top: 18px;
}

/* ============================================================
   CHARACTERS — HERO LAYOUT
   ============================================================ */
.enc-char-hero {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  margin-bottom: 6px;
}
.enc-char-hero-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-top: 4px;
}
.enc-char-name-big {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(18px, 2.4vw, 28px) !important;
  letter-spacing: 5px;
}
.enc-char-quick-tags {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.enc-char-quick-tag {
  font-size: 9px;
  color: #8a6a40;
  letter-spacing: 1px;
  font-family: 'Cinzel', serif;
  transition: color 0.2s;
}
.enc-char-quick-sep {
  font-size: 10px;
  color: #4a3018;
  margin: 0 2px;
}

/* ── Character portrait ── */
.enc-char-layout {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  margin-bottom: 16px;
}
.enc-char-portrait-col { flex: 0 0 120px; }
.enc-char-portrait-frame {
  width: 120px;
  height: 155px;
  border: 2px solid #2a1a08;
  overflow: hidden;
  background: #0a0703;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  margin-bottom: 0;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.enc-char-portrait-frame:hover {
  box-shadow: 0 0 28px rgba(0,0,0,0.5), 0 0 16px rgba(201,162,39,0.08);
  filter: brightness(1.05);
}
.enc-char-portrait-frame img { width:100%; height:100%; object-fit:cover; display:block; }
.enc-char-portrait-ph { font-size: 30px; color: #2a1808; }
.enc-char-color-band {
  height: 3px;
  margin-top: 6px;
  border-radius: 2px;
}
.enc-char-info-col { flex: 1; min-width: 0; }

/* ── Radar chart ── */
.enc-stat-radar {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0 auto 4px;
}
.enc-radar-svg {
  width: 100%;
  max-width: 300px;
  height: auto;
  overflow: visible;
  display: block;
  margin: 0 auto;
}

/* === STAT BARS (replacement for radar) === */
.enc-stat-bars {
  width: 100%;
  max-width: 420px;
  margin: 8px 0 18px;
  padding: 8px 6px;
  background: linear-gradient(180deg, rgba(0,0,0,0.12), rgba(255,255,255,0.01));
  border: 1px solid rgba(42,24,8,0.6);
  border-radius: 6px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02), 0 6px 18px rgba(0,0,0,0.6);
}
.enc-stat-bar-row { display: flex; gap: 10px; align-items: center; padding: 6px 4px; }
.enc-stat-bar-meta { width: 80px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.enc-stat-bar-label { font-size: 9px; color: #bfa86a; letter-spacing: 2px; font-family: 'Cinzel', serif; }
.enc-stat-bar-value { font-family: 'Press Start 2P', monospace; font-size: 11px; color: #fff; text-shadow: 0 0 8px rgba(0,0,0,0.6); }
.enc-stat-bar-track { flex: 1; height: 12px; background: #0b0806; border: 1px solid #1a1005; border-radius: 6px; overflow: hidden; position: relative; }
.enc-stat-bar-fill {
  height: 100%; width: 0%; border-radius: 6px; transition: width 0.7s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.3s;
  box-shadow: 0 0 10px rgba(0,0,0,0.2) inset;
}
.enc-stat-bar-row:hover .enc-stat-bar-fill { filter: brightness(1.05); box-shadow: 0 0 14px rgba(255,255,255,0.06); }
.enc-stat-bar-fill::after { content:''; position:absolute; inset:0; background: linear-gradient(90deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02)); mix-blend-mode: overlay; pointer-events:none; }

/* Small screens */
@media (max-width:700px) {
  .enc-stat-bars { max-width: 100%; }
  .enc-stat-bar-meta { width: 72px; }
}

/* ── Stat bars (kept for legacy) ── */
.enc-stats-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}
.enc-stat-bar-wrap {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.enc-stat-bar-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.enc-stat-bar-label {
  font-size: 8px;
  color: #3a2810;
  letter-spacing: 3px;
  font-family: 'Cinzel', serif;
}
.enc-stat-bar-val {
  font-size: 13px;
  letter-spacing: 1px;
  font-weight: 600;
  text-shadow: 0 0 10px currentColor;
}
.enc-stat-bar-track {
  width: 100%;
  height: 6px;
  background: #0a0703;
  border: 1px solid #1a1005;
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.enc-stat-bar-fill {
  height: 100%;
  border-radius: 3px;
  position: relative;
  animation: enc-stat-fill 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  transition: width 0.4s ease-out;
}
.enc-stat-bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;

}
.enc-stat-lbl { font-size: 7px; color: #2c1e08; letter-spacing: 2px; margin-bottom: 5px; }

/* ── Character tags ── */

.enc-trait-chip:hover {
  transform: translateY(-2px);
}
.enc-trait-common {

  border-color: #4a4a4a;
  background: #0c0c0c;
}
.enc-trait-common:hover {
  color: #e0e0e0;
  border-color: #6a6a6a;
  text-shadow: 0 0 10px rgba(192,192,192,0.3);

.enc-trait-rare {
  color: #4aa9ff;
  border-color: #1f5590;
  background: #04090f;
}
.enc-trait-rare:hover {
  color: #7cc4ff;
  border-color: #3388cc;
  text-shadow: 0 0 12px rgba(74,169,255,0.35);
  box-shadow: 0 0 10px rgba(74,169,255,0.1);
}
.enc-trait-epic {
  color: #c98bff;
  border-color: #6a2eb8;
  background: #0a0510;
}
.enc-trait-epic:hover {

  border-color: #8a4adf;

}
.enc-trait-legendary {
  color: #ffe14a;
  border-color: #9a7200;
  background: #0e0a02;
}
.enc-trait-legendary:hover {
  color: #ffec80;
  border-color: #c49500;
  text-shadow: 0 0 16px rgba(255,225,74,0.45);

}
.enc-trait-mythic {
  color: #ffd86a;
  border-color: #b04e00;
  background: #0f0600;
}
.enc-trait-mythic:hover {
  color: #ffe599;
  border-color: #e06800;
  text-shadow: 0 0 18px rgba(255,106,0,0.5);
  box-shadow: 0 0 16px rgba(255,106,0,0.18);
}
.enc-trait-hexxed {
  color: #c46aff;
  border-color: #5400a0;
  background: #06000c;
}
.enc-trait-hexxed:hover {

  border-color: #7a20cc;

.enc-trait-duality {
  color: #88c8ff;
  border-color: #1a3080;
  background: #020308;
}
.enc-trait-duality:hover {
  color: #b0ddff;
  border-color: #3050b0;
  text-shadow: 0 0 16px rgba(136,200,255,0.45);

/* Shimmyful star & shimmer */
.enc-trait-shimmy {

}
.enc-trait-shimmy::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;

.enc-shimmy-star {
  font-size: 10px;
  animation: enc-star-pop 1.5s ease-in-out infinite;
}
@keyframes enc-shimmy-sweep {

  100% { transform: translateX(100%); }
}

/* ── Character abilities ── */
.enc-char-ability-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 14px;
  background: #090703;
  border: 1px solid #1a1005;

  transition: background 0.15s, border-color 0.15s, transform 0.12s;
}

}

}
.enc-char-ability-row:hover .enc-char-ability-icon {

}
.enc-char-ability-icon { font-size: 14px; flex-shrink: 0; transition: text-shadow 0.2s; }
.enc-char-ability-name {
  font-size: 10px;
  color: #a08050;
  letter-spacing: 0.8px;

/* ── Character passives ── */
.enc-char-passive-row {
  font-size: 10px;
  color: #9a7a50;
  padding: 8px 0 8px 16px;
  border-left: 2px solid #3a2810;

}
.enc-char-passive-row:hover {
  color: #c8a870;
  border-color: #6a4a28;
  text-shadow: 0 0 10px rgba(200,168,100,0.12);
}
.enc-char-passive-row::before { content: '◆ '; color: #5a3818; font-size: 7px; }

/* ── Character info fields ── */
.enc-char-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.enc-info-field {
  padding: 6px 0;
  border-bottom: 1px solid #1a1006;
  transition: border-color 0.2s;
}
.enc-info-field:hover { border-color: #3a2810; }
.enc-info-field:hover .enc-info-val {
  color: #d0b070;
  text-shadow: 0 0 10px rgba(200,168,100,0.12);
}
.enc-info-field:hover .enc-info-lbl {
  color: #7a5a30;
}
.enc-info-lbl {
  font-size: 7px;
  color: #5a3a18;
  letter-spacing: 3px;
  margin-bottom: 4px;
  transition: color 0.2s;
}
.enc-info-val {
  font-size: 10px;
  color: #a08050;
  letter-spacing: 0.5px;
  font-family: 'Cinzel', serif;

}

/* ============================================================
   PLACES
   ============================================================ */
.enc-place-img {
  width: 100%;

}

}

}

/* ============================================================
   STATUS EFFECTS
   ============================================================ */
.enc-status-top {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 18px;
}
.enc-status-orb {
  width: 54px; height: 54px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 0 16px var(--status-col, #888);
  animation: enc-orb-pulse 2.5s infinite ease-in-out;
}
.enc-status-orb.orb-circle::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.3), transparent 65%);
}
.enc-stars-display {
  display: flex;
  gap: 6px;
  margin: 10px 0 16px;
}
.enc-star {
  font-size: 18px;
  animation: enc-star-pop 0.3s ease-out both;
}
.enc-star:nth-child(1) { animation-delay: 0s; }
.enc-star:nth-child(2) { animation-delay: 0.06s; }
.enc-star:nth-child(3) { animation-delay: 0.12s; }
.enc-star:nth-child(4) { animation-delay: 0.18s; }
.enc-star:nth-child(5) { animation-delay: 0.24s; }
.enc-star.empty { opacity: 0.12; }

/* Preview in modal */
.enc-status-preview { display:flex; align-items:center; gap:12px; padding:8px 6px; background:#090703; border:1px solid #1e1208; border-radius:6px; }
.enc-status-preview .enc-status-orb { width:44px; height:44px; }
.enc-status-preview .enc-stars-display { margin:0; }

/* inner elements inside each orb for matched sheen and inset */
.enc-status-orb .orb-sheen,
.enc-status-orb .orb-inner {
  position: absolute; inset: 6px; display:block; pointer-events: none; left:6px; right:6px; top:6px; bottom:6px;
}
.enc-status-orb .orb-glow { position:absolute; left:-6px; right:-6px; top:-6px; bottom:-6px; pointer-events:none; filter: blur(6px); opacity:0.8; }
.enc-status-orb .orb-sheen { border-radius: 6px; mix-blend-mode: screen; opacity: 0.95; }
.enc-status-orb .orb-inner { transform-origin: center; transform: translateZ(0); mix-blend-mode: normal; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
.enc-status-orb.orb-circle .orb-sheen,
.enc-status-orb.orb-circle .orb-inner { border-radius:50%; }

/* Default inner sizes (scale applied per-shape where necessary) */
.enc-status-orb .orb-inner { background: transparent; transform: scale(0.75); }
.enc-status-orb .orb-sheen { background: transparent; }
.enc-status-orb .orb-glow { background: var(--status-col, #888888); }

/* Orb shape variants */
.enc-status-orb.orb-rounded-square { border-radius: 12px; background: linear-gradient(180deg, rgba(0,0,0,0.12), rgba(255,255,255,0.02)); }
.enc-status-orb.orb-square { border-radius: 6px; background: linear-gradient(180deg, rgba(0,0,0,0.18), rgba(255,255,255,0.02)); }
.enc-status-orb.orb-diamond { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(0,0,0,0.22)); }
.enc-status-orb.orb-hexagon { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.26)); }
.enc-status-orb.orb-triangle { clip-path: polygon(50% 0%, 100% 100%, 0% 100%); background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.28)); }
.enc-status-orb.orb-teardrop {
  -webkit-clip-path: url(#teardropClip);
  clip-path: url(#teardropClip);
  transform: translateY(-2%);
  background: radial-gradient(circle at 45% 30%, rgba(255,255,255,0.12), rgba(0,0,0,0.28));
}
.enc-status-orb.orb-star { clip-path: polygon(50% 3%, 61% 38%, 98% 38%, 68% 59%, 79% 95%, 50% 73%, 21% 95%, 32% 59%, 2% 38%, 39% 38%); background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(0,0,0,0.3)); }

/* Per-shape inner styling — use shape-matching clip-paths and add per-shape sheen */
.enc-status-orb.orb-rounded-square::after { content:''; position:absolute; inset:6px; border-radius:10px; background: radial-gradient(circle at 30% 30%, rgba(255,240,210,0.28), rgba(160,120,60,0.08)); mix-blend-mode: overlay; }
.enc-status-orb.orb-square::after { content:''; position:absolute; inset:6px; border-radius:4px; background: repeating-linear-gradient(45deg, rgba(255,240,210,0.09) 0 6px, rgba(0,0,0,0) 6px 12px); mix-blend-mode: overlay; }

/* Diamond */
.enc-status-orb.orb-diamond::before,
.enc-status-orb.orb-diamond::after {
  content: '';
  position: absolute;
  inset: 6px;
  -webkit-clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  transform-origin: center;
  pointer-events: none;
}
.enc-status-orb.orb-diamond::before { background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.22), transparent 60%); mix-blend-mode: screen; z-index:3; }
.enc-status-orb.orb-diamond::after { transform: scale(0.7); background: linear-gradient(180deg, rgba(75,45,20,0.9), rgba(55,35,18,0.72)); box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); mix-blend-mode: normal; z-index:4; }

/* Hexagon */
.enc-status-orb.orb-hexagon::before,
.enc-status-orb.orb-hexagon::after {
  content: '';
  position: absolute;
  inset: 6px;
  -webkit-clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  transform-origin: center;
  pointer-events: none;
}
.enc-status-orb.orb-hexagon::before { background: radial-gradient(circle at 30% 28%, rgba(255,255,255,0.18), transparent 60%); mix-blend-mode: screen; z-index:3; }
.enc-status-orb.orb-hexagon::after { transform: scale(0.7); background: radial-gradient(circle at 50% 45%, rgba(75,45,20,0.85), rgba(55,35,18,0.6)); box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); mix-blend-mode: normal; z-index:4; }

/* Triangle */
.enc-status-orb.orb-triangle::before,
.enc-status-orb.orb-triangle::after {
  content: '';
  position: absolute;
  inset: 6px;
  -webkit-clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  transform-origin: center;
  pointer-events: none;
}
.enc-status-orb.orb-triangle::before { background: radial-gradient(circle at 40% 25%, rgba(255,255,255,0.18), transparent 60%); mix-blend-mode: screen; z-index:3; }
.enc-status-orb.orb-triangle::after { transform: scale(0.72); background: radial-gradient(circle at 50% 45%, rgba(75,45,20,0.85), rgba(55,35,18,0.6)); box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); mix-blend-mode: normal; z-index:4; }

/* Teardrop (SVG clipPath) */
.enc-status-orb.orb-teardrop::before,
.enc-status-orb.orb-teardrop::after {
  content: '';
  position: absolute;
  inset: 6px;
  -webkit-clip-path: url(#teardropClip);
  clip-path: url(#teardropClip);
  transform-origin: center;
  pointer-events: none;
}
.enc-status-orb.orb-teardrop::before { background: radial-gradient(circle at 40% 25%, rgba(255,255,255,0.18), transparent 60%); mix-blend-mode: screen; z-index:3; }
.enc-status-orb.orb-teardrop::after { transform: scale(0.72); background: radial-gradient(circle at 50% 45%, rgba(75,45,20,0.85), rgba(55,35,18,0.6)); box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); mix-blend-mode: normal; z-index:4; }

/* Star */
.enc-status-orb.orb-star::before,
.enc-status-orb.orb-star::after {
  content: '';
  position: absolute;
  inset: 6px;
  -webkit-clip-path: polygon(50% 3%, 61% 38%, 98% 38%, 68% 59%, 79% 95%, 50% 73%, 21% 95%, 32% 59%, 2% 38%, 39% 38%);
  clip-path: polygon(50% 3%, 61% 38%, 98% 38%, 68% 59%, 79% 95%, 50% 73%, 21% 95%, 32% 59%, 2% 38%, 39% 38%);
  transform-origin: center;
  pointer-events: none;
}
.enc-status-orb.orb-star::before { background: radial-gradient(circle at 40% 28%, rgba(255,255,255,0.18), transparent 60%); mix-blend-mode: screen; z-index:3; }
.enc-status-orb.orb-star::after { transform: scale(0.72); background: radial-gradient(circle at 50% 45%, rgba(75,45,20,0.85), rgba(55,35,18,0.6)); box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); mix-blend-mode: normal; z-index:4; }

/* Shape-matched glow for orb-glow span */
.enc-status-orb.orb-circle .orb-glow { border-radius:50%; transform: scale(1.05); }
.enc-status-orb.orb-rounded-square .orb-glow { border-radius:12px; transform: scale(1.05); }
.enc-status-orb.orb-square .orb-glow { border-radius:6px; transform: scale(1.05); }
.enc-status-orb.orb-diamond .orb-glow { -webkit-clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); transform: scale(1.05); }
.enc-status-orb.orb-hexagon .orb-glow { -webkit-clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); transform: scale(1.05); }
.enc-status-orb.orb-triangle .orb-glow { -webkit-clip-path: polygon(50% 0%, 100% 100%, 0% 100%); clip-path: polygon(50% 0%, 100% 100%, 0% 100%); transform: scale(1.05); }
.enc-status-orb.orb-teardrop .orb-glow { -webkit-clip-path: url(#teardropClip); clip-path: url(#teardropClip); transform: scale(1.05); }
.enc-status-orb.orb-star .orb-glow { -webkit-clip-path: polygon(50% 3%, 61% 38%, 98% 38%, 68% 59%, 79% 95%, 50% 73%, 21% 95%, 32% 59%, 2% 38%, 39% 38%); clip-path: polygon(50% 3%, 61% 38%, 98% 38%, 68% 59%, 79% 95%, 50% 73%, 21% 95%, 32% 59%, 2% 38%, 39% 38%); transform: scale(1.05); }
.enc-status-orb .orb-glow { z-index:1; }
.enc-status-orb .orb-sheen { z-index:3; }
.enc-status-orb .orb-inner { z-index:2; }

.enc-item-mod-tag.sub { color: #ff4444; border-color: rgba(255,68,68,0.3); }
.enc-item-mod-tag.mul { color: #ffaa00; border-color: rgba(255,170,0,0.3); }
.enc-item-mod-tag.div { color: #ff00ff; border-color: rgba(255,0,255,0.3); }

.enc-item-passives {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 24px;
}
.enc-item-passive-row {
  font-size: 10px;
  color: #a78b60;
  padding: 10px 14px;
  background: #090604;
  border-left: 3px solid var(--item-col, #c9a227);
  line-height: 1.6;
  font-family: 'Cinzel', serif;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.enc-item-owner-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(0,0,0,0.2));
  border: 1px solid var(--char-col, #221608);
  border-radius: 8px;
  margin-top: 12px;
}

/* ============================================================
   MEMORIES
   ============================================================ */

/* — mode toggle + search controls — */
#enc-mem-controls {
  padding: 10px 12px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.enc-mem-view-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.enc-mem-mode-btn {
  flex: 1;
  padding: 5px 0;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  color: rgba(255,255,255,0.4);
  font-family: inherit;
  font-size: 9px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.enc-mem-mode-btn:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
}
.enc-mem-mode-btn.active {
  background: rgba(231,111,81,0.18);
  border-color: rgba(231,111,81,0.45);
  color: #e76f51;
}
.enc-mem-search-wrap {
  position: relative;
}
.enc-mem-search {
  width: 100%;
  box-sizing: border-box;
  padding: 6px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  color: rgba(255,255,255,0.75);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 1.5px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.enc-mem-search:focus {
  border-color: rgba(231,111,81,0.4);
  background: rgba(255,255,255,0.07);
}
.enc-mem-search::placeholder {
  color: rgba(255,255,255,0.22);
}

/* — character group headers in TOC — */
.enc-mem-char-hd {
  display: flex;
  align-items: center;
  gap: 7px;
  width: 100%;
  background: none;
  border: none;
  padding: 8px 12px 6px;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s;
}
.enc-mem-char-hd:hover {
  background: rgba(255,255,255,0.04);
}
.enc-mem-char-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.85;
}
.enc-mem-char-name {
  flex: 1;
  font-family: inherit;
  font-size: 9px;
  letter-spacing: 2.5px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.enc-mem-char-count {
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.07);
  border-radius: 8px;
  padding: 1px 6px;
  flex-shrink: 0;
}
.enc-mem-char-arrow {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  flex-shrink: 0;
  transition: transform 0.2s;
}
.enc-mem-char-hd.collapsed .enc-mem-char-arrow {
  transform: rotate(-90deg);
}
.enc-mem-char-entries {
  padding: 0 0 4px 0;
}

/* — character picker in memory modal — */
.em-char-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 12px;
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  margin-bottom: 14px;
  min-height: 42px;
}
.em-char-pick-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 9px 4px 7px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  cursor: pointer;
  background: rgba(255,255,255,0.04);
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
}
.em-char-pick-item input[type="checkbox"] {
  display: none;
}
.em-char-pick-item:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
}
.em-char-pick-item.checked {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.35);
}
.em-char-pick-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.em-char-pick-name {
  font-family: inherit;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  white-space: nowrap;
}
.em-char-pick-item.checked .em-char-pick-name {
  color: rgba(255,255,255,0.9);
}

.enc-memory-cover {
  width: 100%;
  height: auto;
  display: block;
  border: 1px solid #2a1808;
  margin-bottom: 18px;
}
.enc-chapter-label {
  font-size: 9px;
  letter-spacing: 5px;
  color: #e76f51;
  opacity: 0.8;
  margin-bottom: 4px;
  transition: opacity 0.2s, text-shadow 0.2s;
}
.enc-chapter-label:hover {
  opacity: 1;
  text-shadow: 0 0 12px rgba(231,111,81,0.3);
}

/* ============================================================
   PARALLAX & FULLSCREEN
   ============================================================ */
.enc-parallax-wrapper {
  overflow: hidden;
  border: 1px solid #2a1808;
  margin-bottom: 18px;
  cursor: pointer;
  position: relative;
  border-radius: 4px;
}
.enc-parallax-wrapper img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.1s ease-out;
  transform: scale(1.02); /* slight scale to hide edges during parallax */
}
#enc-fullscreen-overlay {
  display: none;
  background: rgba(0,0,0,0.95);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#enc-fullscreen-overlay.show {
  display: flex;
  animation: encFadeIn 0.3s ease;
}
#enc-fullscreen-img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 0 50px rgba(0,0,0,1);
  border: 2px solid #2a1808;
}
#enc-fullscreen-close {
  position: absolute;
  top: 20px;
  right: 30px;
  background: none;
  border: none;
  color: #fff;
  font-size: 32px;
  cursor: pointer;
  opacity: 0.6;
}
#enc-fullscreen-close:hover { opacity: 1; }
.enc-scenes { display: flex; flex-direction: column; gap: 20px; margin-top: 8px; }
.enc-scene {
  border-left: 2px solid #2a1808;
  padding-left: 18px;
  position: relative;
  transition: border-color 0.2s;
}
.enc-scene:hover { border-color: #4a3828; }
.enc-scene::before {
  content: '◆';
  position: absolute;
  left: -6px; top: 1px;
  font-size: 8px;
  color: #e76f51;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.enc-scene:hover::before { opacity: 0.8; }
.enc-scene-title {
  font-size: 10px;
  color: #e76f51;
  letter-spacing: 2px;
  margin-bottom: 8px;
  opacity: 0.9;
  font-family: 'Cinzel', serif;
  transition: opacity 0.2s, text-shadow 0.2s;
}
.enc-scene:hover .enc-scene-title {
  opacity: 1;
  text-shadow: 0 0 14px rgba(231,111,81,0.3);
}
.enc-scene-text {
  font-size: 11px;
  color: #a88a5c;
  line-height: 2;
  letter-spacing: 0.4px;
  font-family: 'Cinzel', serif;
  white-space: pre-wrap;
  transition: color 0.2s, text-shadow 0.2s;
}
.enc-scene:hover .enc-scene-text {
  color: #c8a878;
  text-shadow: 0 0 12px rgba(200,168,120,0.1);
}
.enc-scene-btns { display:flex; gap:6px; margin-top:10px; }
.enc-scene-btns .btn { font-size:8px; padding:5px 12px; }
.enc-add-scene-bar {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px dashed #1e1208;
  display: flex;
  gap: 8px;
}
.enc-scene-form {
  background: #090703;
  border: 1px solid #2a1808;
  padding: 16px;
  margin-top: 14px;
  animation: enc-anim-fade 0.3s ease-out both;
}
.enc-scene-form-field { margin-bottom: 12px; }
.enc-scene-form-field label {
  display:block;
  font-size:8px;
  color:#6a4a28;
  letter-spacing:3px;
  margin-bottom:6px;
}
.enc-scene-form-field input,
.enc-scene-form-field textarea {
  width: 100%;
  background: #060402;
  border: 1px solid #1e1208;
  color: #8a7050;
  font-family: var(--font-main);
  font-size: 10px;
  padding: 10px 12px;
  outline: none;
  line-height: 1.7;
  box-sizing: border-box;
  letter-spacing: 0.5px;
  transition: border-color 0.2s;
}
.enc-scene-form-field input:focus,
.enc-scene-form-field textarea:focus { border-color: var(--enc-col); }
.enc-scene-form-field textarea { resize: vertical; min-height: 110px; }
.enc-scene-form-btns { display:flex; gap:8px; justify-content:flex-end; }

/* ============================================================
   MODALS
   ============================================================ */
.enc-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 10010;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.enc-overlay.open { display: flex; }
.enc-modal {
  background: #0c0905;
  border: 1px solid #2a1808;
  border-top: 2px solid var(--enc-col);
  width: min(700px, 96vw);
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 80px rgba(0,0,0,0.97), 0 0 0 1px #180f03, 0 0 160px rgba(0,0,0,0.4);
  animation: enc-float-in 0.3s ease-out;
}
.enc-modal-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border-bottom: 1px solid #1e1208;
  flex-shrink: 0;
}
.enc-modal-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--enc-col);
  letter-spacing: 4px;
  transition: color 0.3s;
}
.enc-modal-body {
  padding: 20px 22px;
  overflow-y: auto;
  flex: 1;
}
.enc-modal-body::-webkit-scrollbar { width: 4px; }
.enc-modal-body::-webkit-scrollbar-thumb { background: #2a1808; border-radius: 2px; }
.enc-modal-ft {
  padding: 14px 22px;
  border-top: 1px solid #1e1208;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  flex-shrink: 0;
  background: #090703;
}
.enc-field { margin-bottom: 14px; }
.enc-field label {
  display: block;
  font-size: 8px;
  color: #6a4a28;
  letter-spacing: 3px;
  margin-bottom: 7px;
}
.enc-field input[type="text"],
.enc-field input[type="url"],
.enc-field textarea,
.enc-field select {
  width: 100%;
  background: #070502;
  border: 1px solid #1e1208;
  color: #8a7050;
  font-family: var(--font-main);
  font-size: 10px;
  padding: 10px 13px;
  outline: none;
  line-height: 1.7;
  letter-spacing: 0.5px;
  box-sizing: border-box;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.enc-field input:focus, .enc-field textarea:focus, .enc-field select:focus {
  border-color: var(--enc-col);
  box-shadow: 0 0 8px rgba(201,162,39,0.08);
}
.enc-field textarea { resize: none; }
.enc-field select { appearance: none; cursor: pointer; }
.enc-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.enc-three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* ── Image preview ── */
.enc-img-preview {
  width: 100%;
  aspect-ratio: 16/6;
  background: #060402;
  border: 1px dashed #1e1208;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-top: 8px;
  transition: border-color 0.2s;
}
.enc-img-preview:hover { border-color: #2a1808; }
.enc-img-preview img { width:100%; height:100%; object-fit:cover; }
.enc-img-no-label { font-size: 10px; color: #3a2810; letter-spacing: 3px; }

/* ── Star picker ── */
.enc-star-picker { display:flex; gap:6px; margin-top:4px; }
.enc-star-pick {
  font-size: 22px;
  color: #2a1808;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 3px;
  transition: color 0.15s, transform 0.15s;
  line-height: 1;
}
.enc-star-pick.lit { color: #c9a227; text-shadow: 0 0 8px rgba(201,162,39,0.4); }
.enc-star-pick:hover { transform: scale(1.3); }

/* ── Color presets ── */
.enc-color-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.enc-color-swatch {
  width: 24px; height: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border-radius: 2px;
}
.enc-color-swatch:hover { transform: scale(1.3); box-shadow: 0 0 10px currentColor; }

/* ── Soundtrack rows in form ── */
.enc-st-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
  align-items: stretch;
}
.enc-st-row input {
  flex: 1;
  min-width: 0;
  background: #070502;
  border: 1px solid #1e1208;
  color: #8a7050;
  font-family: var(--font-main);
  font-size: 9px;
  padding: 8px 10px;
  outline: none;
  box-sizing: border-box;
  transition: border-color 0.2s;
}
.enc-st-row input:focus { border-color: var(--enc-col); }
.enc-st-lbl { width: 130px; }

/* ── Confirm ── */
#enc-confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 10020;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#enc-confirm-overlay.open { display: flex; }
#enc-confirm-box {
  background: #0c0905;
  border: 1px solid #2a1808;
  border-top: 2px solid #e74c3c;
  padding: 32px 34px;
  text-align: center;
  max-width: 340px;
  box-shadow: 0 0 60px rgba(0,0,0,0.95);
  animation: enc-float-in 0.25s ease-out;
}
#enc-confirm-msg {
  font-size: 11px;
  color: #a88a5c;
  letter-spacing: 1.5px;
  margin-bottom: 20px;
  line-height: 1.8;
}
#enc-confirm-btns { display:flex; gap:12px; justify-content:center; }

/* ============================================================
   RESPONSIVE & MOBILE DRAWER
   ============================================================ */
.mobile-toc-toggle-btn {
  display: none;
}
#enc-mobile-toc-btn-wrap {
  width: 80px;
  display: flex;
  justify-content: flex-end;
}
#enc-mobile-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 99;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

@media (max-width: 700px) {
  body { overflow: auto; }
  
  /* Mobile masthead tweaks */
  .mobile-toc-toggle-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 6px 12px;
    border: 1px solid var(--enc-col, #c9a227);
    color: var(--enc-col, #c9a227);
    background: transparent;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s, color 0.2s;
  }
  .mobile-toc-toggle-btn:hover {
    background: rgba(201,162,39,0.1);
  }
  
  #enc-mobile-backdrop {
    display: block;
    pointer-events: none;
  }
  #enc-mobile-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  #enc-book { 
    flex-direction: column; 
    height: calc(100vh - 120px); 
    min-height: 480px; 
    border: none;
    box-shadow: none;
  }
  
  /* Left panel becomes the slide-out drawer */
  #enc-left { 
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 280px;
    max-width: 80%;
    height: 100vh;
    max-height: 100vh;
    z-index: 100;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 8px 0 30px rgba(0, 0, 0, 0.95);
    background: linear-gradient(170deg, #0f0c07 0%, #0c0905 100%);
    border: none;
    border-right: 1px solid #221608;
    flex: none;
  }
  #enc-left.open {
    transform: translateX(0);
  }
  
  /* Spine is hidden on mobile for clean book reading look */
  #enc-spine { display: none; }
  
  #enc-right { 
    flex: 1; 
    width: 100%;
    border-left: none;
    background: linear-gradient(170deg, #110e08 0%, #0e0b06 100%);
  }
  
  /* Tabs strip remains nicely accessible at the bottom */
  #enc-tabs-strip { 
    flex-direction: row; 
    flex: 0 0 auto; 
    border-left: none; 
    border-top: 1px solid #1c1207; 
    padding: 0 12px; 
    justify-content: space-around;
  }
  .enc-tab-btn { 
    writing-mode: horizontal-tb; 
    transform: none; 
    padding: 12px 10px; 
    border-right: none; 
    border-bottom: 2px solid transparent; 
    font-size: 8px;
    letter-spacing: 1px;
    text-align: center;
  }
  .enc-tab-btn.active { 
    border-bottom-color: var(--enc-col); 
    border-right-color: transparent; 
  }
  
  #enc-content-col { flex-direction: column; }
  .enc-char-hero { flex-direction: column; align-items: center; text-align: center; }
  .enc-char-quick-tags { justify-content: center; }
  .enc-char-info-grid { grid-template-columns: 1fr; }
  #enc-content-scroll { padding: 20px 20px 24px; }
  .enc-entry-actions { justify-content: center; flex-wrap: wrap; }
}

/* ============================================================
   ENCYCLOPÆDIA BRIGHTNESS + HOVER GLOW
   ============================================================ */
:root {
  --enc-text-bright: #f5edd6;
  --enc-text-normal: #d6c39a;
  --enc-text-muted: #9a7f57;
  --enc-glow: rgba(201,162,39,0.95);
}
#enc-book { --enc-text-bright: #fff6df; --enc-text-normal: #e1cea0; --enc-text-muted: #a78b60; }

/* Make regular encyclopedia text brighter and easier to read */
.enc-body-text,
.enc-toc-txt,
.enc-info-val,
.enc-char-passive-row,
.enc-char-tag,
.enc-char-quick-tag,
.enc-stat-bar-val,
.enc-stat-val,
.enc-idx-sub,
.enc-toc-n,
.enc-page-info,
.enc-main-sub,
.enc-idx-label,
.enc-entry-name,
.enc-char-name-big,
.enc-char-ability-name,
.enc-empty-title,
.enc-empty-sub,
.enc-badge,
.enc-char-ability-type,
.enc-stat-lbl,
.enc-stat-box,
.enc-info-lbl {
  color: var(--enc-text-normal) !important;
  transition: color 0.18s ease, text-shadow 0.22s ease, transform 0.12s ease;
}

/* Subtle darker tone for less prominent text */
.enc-body-text { color: var(--enc-text-muted) !important; }

/* Hover light-up animation for most text elements */
.enc-body-text:hover,
.enc-toc-txt:hover,
.enc-info-val:hover,
.enc-char-passive-row:hover,
.enc-char-tag:hover,
.enc-char-quick-tag:hover,
.enc-stat-bar-val:hover,
.enc-stat-val:hover,
.enc-idx-sub:hover,
.enc-toc-n:hover,
.enc-page-info:hover,
.enc-main-sub:hover,
.enc-idx-label:hover,
.enc-entry-name:hover,
.enc-char-name-big:hover,
.enc-char-ability-name:hover,
.enc-empty-title:hover,
.enc-badge:hover,
.enc-info-lbl:hover {
  color: var(--enc-text-bright) !important;
  text-shadow: 0 0 8px var(--enc-glow), 0 0 24px rgba(201,162,39,0.18);
  transform: translateY(-1px);
}

/* Also enable focus-visible for keyboard users */
.enc-body-text:focus-visible,
.enc-toc-txt:focus-visible,
.enc-info-val:focus-visible {
  outline: 2px solid rgba(201,162,39,0.14);
  outline-offset: 2px;
}

</style>

    <polygon points="2,1 2,17 6,13 9,19 12,17 9,11 15,11" fill="none" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>

<div id="notif"></div>

<!-- ── Masthead ── -->
<div id="enc-masthead">
  <button class="btn" onclick="location.href='index.html'">&lt; BACK</button>
  <div id="enc-title-block">
    <div class="enc-main-title">ENCYCLOPÆDIA</div>
    <div class="enc-main-sub">CODEX OF THE REALM</div>
    <div class="enc-masthead-deco">
      <div class="enc-masthead-deco-line"></div>

  </div>

    <button class="btn mobile-toc-toggle-btn" id="enc-mobile-toc-toggle" onclick="toggleMobileToC()">INDEX ☰</button>

</div>

<div id="enc-mobile-backdrop" onclick="toggleMobileToC()"></div>

<!-- ── Book ── -->
<div id="enc-book-wrap">
  <div id="enc-book">

    <!-- LEFT PAGE -->
    <div id="enc-left">
      <div id="enc-left-hd">
        <div class="enc-idx-label" id="enc-idx-label">CHARACTERS</div>
        <div class="enc-idx-sub" id="enc-idx-sub">INDEX &amp; TABLE OF CONTENTS</div>

      <div id="enc-mem-controls" style="display:none">
        <div class="enc-mem-view-row">
          <button class="enc-mem-mode-btn active" id="enc-mem-btn-char" onclick="setMemViewMode('char')">BY CHARACTER</button>

        </div>
        <div class="enc-mem-search-wrap">
          <input id="enc-mem-search" class="enc-mem-search" type="text" placeholder="&#128269; SEARCH CHARACTERS..."

        </div>
      </div>
      <div id="enc-toc"></div>
      <div id="enc-left-ft">
        <div id="enc-left-ft-content"></div>
      </div>
    </div>

    <!-- SPINE -->
    <div id="enc-spine">
      <div class="enc-spine-lbl">CODEX</div>
    </div>

    <!-- RIGHT PAGE -->
    <div id="enc-right">
      <div id="enc-content-col">
        <div id="enc-content-scroll">
          <div id="enc-content"></div>
        </div>
        <div id="enc-footer-nav">
          <button class="enc-nav-btn" id="enc-prev-btn" onclick="encNav('prev')" disabled>&#8592; PREV</button>
          <div id="enc-page-info">— —</div>
          <button class="enc-nav-btn" id="enc-next-btn" onclick="encNav('next')" disabled>NEXT &#8594;</button>
        </div>
      </div>
      <!-- Section tabs -->
      <div id="enc-tabs-strip">
        <button class="enc-tab-btn active" data-section="characters" onclick="switchSection('characters')">⚔ CHARACTERS</button>
        <button class="enc-tab-btn" data-section="places"     onclick="switchSection('places')">◈ PLACES</button>
        <button class="enc-tab-btn" data-section="statuses"   onclick="switchSection('statuses')">✦ STATUS FX</button>
        <button class="enc-tab-btn" data-section="memories"   onclick="switchSection('memories')">✦ MEMORIES</button>
        <button class="enc-tab-btn" data-section="items"      onclick="switchSection('items')">ITEMS</button>
        <button class="enc-tab-btn" data-section="npcs"       onclick="switchSection('npcs')">◉ NPCS</button>
      </div>
    </div>

  </div>
</div>

<!-- ============================================================
     FULLSCREEN IMAGE MODAL
     ============================================================ -->
<div class="enc-overlay" id="enc-fullscreen-overlay" onclick="closeFullscreenImage(event)">
  <button id="enc-fullscreen-close" onclick="closeFullscreenImage(event)">✕</button>
  <img id="enc-fullscreen-img" src="" alt="">
</div>

<!-- ============================================================
     PLACE EDITOR MODAL
     ============================================================ -->
<div class="enc-overlay" id="enc-place-overlay">
  <div class="enc-modal">
    <div class="enc-modal-hd">
      <span class="enc-modal-title" id="enc-place-modal-title">NEW PLACE</span>
      <button class="btn icon-btn" onclick="closePlaceModal()">&times;</button>
    </div>
    <div class="enc-modal-body">
      <div class="enc-two-col">
        <div class="enc-field">
          <label>NAME *</label>
          <input type="text" id="ep-name" placeholder="e.g. The Shattered Spire" maxlength="80"/>
        </div>
        <div class="enc-field">
          <label>REGION / AREA</label>
          <input type="text" id="ep-region" placeholder="e.g. Northern Wastes" maxlength="60"/>
        </div>
      </div>
      <div class="enc-field">
        <label>TYPE</label>
        <select id="ep-type">
          <option value="CITY">CITY</option>
          <option value="DUNGEON">DUNGEON</option>
          <option value="WILDERNESS">WILDERNESS</option>
          <option value="LANDMARK">LANDMARK</option>
          <option value="REALM">REALM</option>
          <option value="RUIN">RUIN</option>
          <option value="VOID">VOID</option>
          <option value="OTHER">OTHER</option>
        </select>
      </div>
      <div class="enc-field">
        <label>DESCRIPTION</label>
        <textarea id="ep-desc" rows="3" placeholder="What does this place look like? What feeling does it give?"></textarea>
      </div>
      <div class="enc-field">
        <label>LORE &amp; HISTORY</label>
        <textarea id="ep-lore" rows="3" placeholder="The history, myths, and significance of this place..."></textarea>
      </div>
      <div class="enc-field">
        <label>NOTABLE FEATURES</label>
        <textarea id="ep-features" rows="2" placeholder="Landmarks, hazards, unique properties..."></textarea>
      </div>
      <div class="enc-field">
        <label style="display:flex;justify-content:space-between;align-items:center;">
          IMAGE <span style="cursor:pointer;color:var(--enc-col)" onclick="document.getElementById('ep-img-file').click()">[UPLOAD]</span>
          <input type="file" id="ep-img-file" accept="image/*" style="display:none" onchange="handleEncImgUpload('place',event);this.value=''"/>
        </label>
        <div class="enc-img-preview" id="ep-img-preview">
          <span class="enc-img-no-label">NO IMAGE</span>
        </div>
        <button class="btn sm" id="ep-img-clear" style="margin-top:5px;display:none" type="button" onclick="clearEncImg('place')">✕ CLEAR</button>
      </div>
      <div class="enc-field">
        <label>SOUNDTRACKS <span style="opacity:0.4;font-size:5.5px">(YOUTUBE LINKS)</span></label>
        <div id="ep-soundtracks-list"></div>
        <button class="btn sm" type="button" onclick="addSoundtrackRow()">+ ADD TRACK</button>
      </div>
    </div>
    <div class="enc-modal-ft">
      <button class="btn" onclick="closePlaceModal()">CANCEL</button>
      <button class="btn accent" onclick="savePlaceModal()">SAVE PLACE</button>
    </div>
  </div>
</div>

<!-- ============================================================
     STATUS EDITOR MODAL
     ============================================================ -->
<!-- SVG defs for shape masks/clipPaths -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <defs>
    <clipPath id="teardropClip" clipPathUnits="objectBoundingBox">
      <path d="M0.5 0 C0.35 0,0.2 0.125,0.2 0.25 C0.2 0.375,0.35 0.625,0.5 0.78 C0.65 0.625,0.8 0.375,0.8 0.25 C0.8 0.125,0.65 0,0.5 0 Z" />
    </clipPath>
  </defs>
</svg>
<div class="enc-overlay" id="enc-status-overlay">
  <div class="enc-modal">
    <div class="enc-modal-hd">
      <span class="enc-modal-title" id="enc-status-modal-title">NEW STATUS EFFECT</span>
      <button class="btn icon-btn" onclick="closeStatusModal()">&times;</button>
    </div>
    <div class="enc-modal-body">
      <div class="enc-two-col">
        <div class="enc-field">
          <label>NAME *</label>
          <input type="text" id="es-name" placeholder="e.g. Burning" maxlength="60"/>
        </div>
        <div class="enc-field">
          <label>TYPE</label>
          <select id="es-type">
            <option value="DEBUFF">DEBUFF</option>
            <option value="BUFF">BUFF</option>
            <option value="NEUTRAL">NEUTRAL</option>
            <option value="PASSIVE">PASSIVE</option>
            <option value="UNIQUE">UNIQUE</option>
          </select>
        </div>
      </div>
      <div class="enc-field">
        <label>COLOR</label>
        <input type="color" id="es-color" value="#ff4444" style="width:48px;height:28px;border:1px solid #2a1808;background:#0a0703;cursor:pointer;padding:2px;" oninput="updateStatusPreview()"/>
        <div class="enc-color-presets">
          <div class="enc-color-swatch" style="background:#ff4444" onclick="document.getElementById('es-color').value='#ff4444'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#ff8844" onclick="document.getElementById('es-color').value='#ff8844'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#ffff44" onclick="document.getElementById('es-color').value='#ffff44'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#44ff88" onclick="document.getElementById('es-color').value='#44ff88'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#44aaff" onclick="document.getElementById('es-color').value='#44aaff'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#aa44ff" onclick="document.getElementById('es-color').value='#aa44ff'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#ff44aa" onclick="document.getElementById('es-color').value='#ff44aa'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#aaaaaa" onclick="document.getElementById('es-color').value='#aaaaaa'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#ffffff" onclick="document.getElementById('es-color').value='#ffffff'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#00ffff" onclick="document.getElementById('es-color').value='#00ffff'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#cc99ff" onclick="document.getElementById('es-color').value='#cc99ff'; updateStatusPreview();"></div>
          <div class="enc-color-swatch" style="background:#00ff80" onclick="document.getElementById('es-color').value='#00ff80'; updateStatusPreview();"></div>
        </div>
      </div>
      <div class="enc-field">
        <label>SEVERITY (STARS)</label>
        <div class="enc-star-picker" id="es-stars-picker">
          <button class="enc-star-pick" data-v="1" type="button" onclick="pickStar(1)">★</button>
          <button class="enc-star-pick" data-v="2" type="button" onclick="pickStar(2)">★</button>
          <button class="enc-star-pick" data-v="3" type="button" onclick="pickStar(3)">★</button>
          <button class="enc-star-pick" data-v="4" type="button" onclick="pickStar(4)">★</button>
          <button class="enc-star-pick" data-v="5" type="button" onclick="pickStar(5)">★</button>
        </div>
        <input type="hidden" id="es-stars" value="1"/>
      </div>
      <div class="enc-field">
        <label>SHAPE</label>
        <select id="es-shape" onchange="updateStatusPreview()">
          <option value="circle">Sphere</option>
          <option value="rounded-square">Rounded Square</option>
          <option value="square">Sharp Square</option>
          <option value="diamond">Diamond</option>
          <option value="hexagon">Hexagon</option>
          <option value="triangle">Triangle</option>
          <option value="teardrop">Teardrop</option>
          <option value="star">Star</option>
        </select>
      </div>
      <div class="enc-field">
        <label>PREVIEW</label>
        <div id="es-preview" class="enc-status-preview">
          <div class="enc-status-orb orb-circle" id="es-preview-orb" style="--status-col:#aaaaaa; border:2px solid #aaaaaa66">
            <span class="orb-glow"></span>
            <span class="orb-sheen"></span>
            <span class="orb-inner"></span>
          </div>
          <div id="es-preview-stars" class="enc-stars-display"></div>
        </div>
      </div>
      <div class="enc-field">
        <label>EFFECT DESCRIPTION</label>
        <textarea id="es-desc" rows="4" placeholder="What does this status do? Include mechanics, damage, stat changes..."></textarea>
      </div>
      <div class="enc-field">
        <label>DURATION</label>
        <input type="text" id="es-duration" placeholder="e.g. 3 turns, until healed, permanent" maxlength="80"/>
      </div>
    </div>
    <div class="enc-modal-ft">
      <button class="btn" onclick="closeStatusModal()">CANCEL</button>
      <button class="btn accent" onclick="saveStatusModal()">SAVE STATUS</button>
    </div>
  </div>
</div>

<!-- ============================================================
     MEMORY EDITOR MODAL
     ============================================================ -->
<div class="enc-overlay" id="enc-memory-overlay">
  <div class="enc-modal">
    <div class="enc-modal-hd">
      <span class="enc-modal-title" id="enc-memory-modal-title">NEW CHAPTER</span>
      <button class="btn icon-btn" onclick="closeMemoryModal()">&times;</button>
    </div>
    <div class="enc-modal-body">
      <div class="enc-field">
        <label>CHAPTER TITLE *</label>
        <input type="text" id="em-title" placeholder="e.g. The Night of Falling Stars" maxlength="100"/>
      </div>
      <div class="enc-two-col">
        <div class="enc-field">
          <label>ARC / SAGA</label>
          <input type="text" id="em-arc" placeholder="e.g. Arc I — The Beginning" maxlength="80"/>
        </div>
        <div class="enc-field">
          <label>IN-UNIVERSE DATE</label>
          <input type="text" id="em-date" placeholder="e.g. Year 302, 3rd Moon" maxlength="60"/>
        </div>
      </div>
      <div class="enc-field">
        <label>CHARACTERS <span style="opacity:0.4;font-size:5.5px">(OPTIONAL — link this chapter to characters)</span></label>
        <div id="em-char-picker" class="em-char-picker"></div>
      </div>
      <div class="enc-field">
        <label style="display:flex;justify-content:space-between;align-items:center;">
          COVER IMAGE <span style="opacity:0.4;font-size:5.5px">(optional)</span>
          <span style="cursor:pointer;color:var(--enc-col)" onclick="document.getElementById('em-img-file').click()">[UPLOAD]</span>
          <input type="file" id="em-img-file" accept="image/*" style="display:none" onchange="handleEncImgUpload('memory',event);this.value=''"/>
        </label>
        <div class="enc-img-preview" id="em-img-preview">
          <span class="enc-img-no-label">NO IMAGE</span>
        </div>
        <button class="btn sm" id="em-img-clear" style="margin-top:5px;display:none" type="button" onclick="clearEncImg('memory')">✕ CLEAR</button>
      </div>
    </div>
    <div class="enc-modal-ft">
      <button class="btn" onclick="closeMemoryModal()">CANCEL</button>
      <button class="btn accent" onclick="saveMemoryModal()">SAVE CHAPTER</button>
    </div>
  </div>
</div>

<!-- ── Confirm ── -->
<div id="enc-confirm-overlay">
  <div id="enc-confirm-box">
    <div id="enc-confirm-msg">ARE YOU SURE?</div>
    <div id="enc-confirm-btns">
      <button class="btn danger" id="enc-confirm-yes">DELETE</button>
      <button class="btn" id="enc-confirm-no">CANCEL</button>
    </div>
  </div>
</div>

<!-- NPC EDITOR MODAL -->
<div class="enc-overlay" id="enc-npc-overlay">
  <div class="enc-modal">
    <div class="enc-modal-hd">
      <span class="enc-modal-title" id="enc-npc-modal-title">NEW NPC</span>
      <button class="btn icon-btn" onclick="closeNpcModal()">&times;</button>
    </div>
    <div class="enc-modal-body">
      <div class="enc-two-col">
        <div class="enc-field">
          <label>NAME *</label>
          <input type="text" id="en-name" placeholder="e.g. The Archivist" maxlength="80"/>
        </div>
        <div class="enc-field">
          <label>ROLE / TITLE</label>
          <input type="text" id="en-role" placeholder="e.g. Merchant, Guard Captain" maxlength="60"/>
        </div>
      </div>
      <div class="enc-two-col">
        <div class="enc-field">
          <label>AFFILIATION</label>
          <input type="text" id="en-affiliation" placeholder="e.g. The Silver Guild" maxlength="80"/>
        </div>
        <div class="enc-field">
          <label>ALIGNMENT</label>
          <select id="en-alignment">
            <option value="NEUTRAL">NEUTRAL</option>
            <option value="FRIENDLY">FRIENDLY</option>
            <option value="HOSTILE">HOSTILE</option>
            <option value="ALLY">ALLY</option>
            <option value="ENEMY">ENEMY</option>
            <option value="UNKNOWN">UNKNOWN</option>
          </select>
        </div>
      </div>
      <div class="enc-field">
        <label>ACCENT COLOR</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="color" id="en-color" value="#e05a9a" style="width:48px;height:28px;border:1px solid #2a1808;background:#0a0703;cursor:pointer;padding:2px;"/>
          <div class="enc-color-presets">
            <div class="enc-color-swatch" style="background:#e05a9a" onclick="document.getElementById('en-color').value='#e05a9a'"></div>
            <div class="enc-color-swatch" style="background:#e05a5a" onclick="document.getElementById('en-color').value='#e05a5a'"></div>
            <div class="enc-color-swatch" style="background:#e09a5a" onclick="document.getElementById('en-color').value='#e09a5a'"></div>
            <div class="enc-color-swatch" style="background:#c9a227" onclick="document.getElementById('en-color').value='#c9a227'"></div>
            <div class="enc-color-swatch" style="background:#5ae0a0" onclick="document.getElementById('en-color').value='#5ae0a0'"></div>
            <div class="enc-color-swatch" style="background:#5aaae0" onclick="document.getElementById('en-color').value='#5aaae0'"></div>
            <div class="enc-color-swatch" style="background:#a05ae0" onclick="document.getElementById('en-color').value='#a05ae0'"></div>
            <div class="enc-color-swatch" style="background:#aaaaaa" onclick="document.getElementById('en-color').value='#aaaaaa'"></div>
          </div>
        </div>
      </div>
      <div class="enc-field">
        <label>DESCRIPTION</label>
        <textarea id="en-desc" rows="3" placeholder="Who is this NPC? What do they look like?"></textarea>
      </div>
      <div class="enc-field">
        <label>PERSONALITY</label>
        <textarea id="en-personality" rows="2" placeholder="How do they behave? What drives them?"></textarea>
      </div>
      <div class="enc-field">
        <label>NOTES</label>
        <textarea id="en-notes" rows="2" placeholder="DM notes, quest hooks, secrets..."></textarea>
      </div>
      <div class="enc-field">
        <label style="display:flex;justify-content:space-between;align-items:center;">
          IMAGE <span style="cursor:pointer;color:var(--enc-col)" onclick="document.getElementById('en-img-file').click()">[UPLOAD]</span>
          <input type="file" id="en-img-file" accept="image/*" style="display:none" onchange="handleNpcImgUpload(event);this.value=''"/>
        </label>
        <div class="enc-img-preview" id="en-img-preview">
          <span class="enc-img-no-label">NO IMAGE</span>
        </div>
        <button class="btn sm" id="en-img-clear" style="margin-top:5px;display:none" type="button" onclick="clearNpcImg()">✕ CLEAR</button>
      </div>
    </div>
    <div class="enc-modal-ft">
      <button class="btn" onclick="closeNpcModal()">CANCEL</button>
      <button class="btn accent" onclick="saveNpcModal()">SAVE NPC</button>
    </div>
  </div>
</div>
