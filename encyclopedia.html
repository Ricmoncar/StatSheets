<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STATSHEETS — ENCYCLOPÆDIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css?v=3"/>
<style>

/* ============================================================
   BASE
   ============================================================ */
body {
  background: #060402;
  padding: 0;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  overflow: hidden;
}

/* ── Masthead ── */
#enc-masthead {
  display: flex;
  align-items: center;
  padding: 12px 20px 8px;
  flex-shrink: 0;
  gap: 16px;
  border-bottom: 1px solid #1a1005;
  background: #060402;
  position: relative;
  z-index: 2;
}
#enc-title-block { flex: 1; text-align: center; }
.enc-main-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(13px, 2vw, 20px);
  color: #c9a227;
  letter-spacing: 6px;
  text-shadow: 0 0 24px rgba(201,162,39,0.4), 0 0 60px rgba(201,162,39,0.1);
  line-height: 1.3;
}
.enc-main-sub {
  font-family: 'Cinzel', serif;
  font-size: 6.5px;
  color: #3a2508;
  letter-spacing: 7px;
  margin-top: 2px;
}
.enc-masthead-deco {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 3px;
}
.enc-masthead-deco-line {
  height: 1px;
  width: 50px;
  background: linear-gradient(to right, transparent, #2a1808);
}
.enc-masthead-deco-line.r { background: linear-gradient(to left, transparent, #2a1808); }
.enc-masthead-deco-gem { font-size: 6px; color: #2a1808; }

/* ── Book wrap ── */
#enc-book-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 12px 12px;
  min-height: 0;
}

/* ============================================================
   BOOK
   ============================================================ */
#enc-book {
  display: flex;
  width: min(1200px, 100%);
  height: calc(100vh - 108px);
  min-height: 480px;
  box-shadow:
    0 30px 90px rgba(0,0,0,0.97),
    -10px 4px 24px rgba(0,0,0,0.5),
    10px 4px 24px rgba(0,0,0,0.5);
  --enc-col: #c9a227;
}

/* ── Left page ── */
#enc-left {
  flex: 0 0 28%;
  min-width: 160px;
  max-width: 280px;
  background: linear-gradient(170deg, #0f0c07 0%, #0c0905 100%);
  border: 1px solid #221608;
  border-right: none;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
/* Stacked pages — left side */
#enc-left::before {
  content: '';
  position: absolute;
  left: -5px; top: 4px; bottom: -4px; width: 5px;
  background: #0a0703;
  border-left: 1px solid #180f03;
  z-index: 0;
}
#enc-left::after {
  content: '';
  position: absolute;
  left: -9px; top: 8px; bottom: -8px; width: 4px;
  background: #060401;
  border-left: 1px solid #100802;
  z-index: 0;
}
#enc-left-hd {
  padding: 16px 16px 10px;
  border-bottom: 1px solid #1c1207;
  flex-shrink: 0;
}
.enc-idx-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(7px, 0.9vw, 10px);
  color: var(--enc-col);
  letter-spacing: 3px;
  margin-bottom: 2px;
  transition: color 0.25s;
}
.enc-idx-sub { font-size: 5.5px; color: #2c1e08; letter-spacing: 2px; }

#enc-toc {
  flex: 1;
  overflow-y: auto;
  padding: 5px 0;
}
#enc-toc::-webkit-scrollbar { width: 3px; }
#enc-toc::-webkit-scrollbar-thumb { background: #2a1808; }

.enc-toc-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.enc-toc-item:hover { background: rgba(255,255,255,0.015); }
.enc-toc-item.active { background: rgba(255,255,255,0.025); }
.enc-toc-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--enc-col);
}
.enc-toc-n {
  font-family: 'Cinzel', serif;
  font-size: 5.5px;
  color: #2c1e08;
  width: 14px;
  text-align: right;
  flex-shrink: 0;
}
.enc-toc-txt {
  font-size: 6px;
  color: #5a4428;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.3px;
  transition: color 0.15s;
}
.enc-toc-item.active .enc-toc-txt { color: var(--enc-col); }
.enc-toc-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.enc-toc-item.active .enc-toc-dot { opacity: 1; }

#enc-left-ft {
  padding: 10px 12px;
  border-top: 1px solid #1c1207;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ── Spine ── */
#enc-spine {
  flex: 0 0 18px;
  background: linear-gradient(to right, #14090302 0%, #1e1108 20%, #2a1a0a 50%, #1e1108 80%, #14090302 100%);
  border-left: 1px solid #281608;
  border-right: 1px solid #281608;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
#enc-spine::before, #enc-spine::after {
  content: '';
  position: absolute;
  left: 3px; right: 3px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(201,162,39,0.18), transparent);
}
#enc-spine::before { top: 14px; }
#enc-spine::after  { bottom: 14px; }
.enc-spine-lbl {
  font-family: 'Cinzel', serif;
  font-size: 5px;
  color: rgba(201,162,39,0.18);
  writing-mode: vertical-rl;
  letter-spacing: 5px;
  text-transform: uppercase;
}

/* ── Right page ── */
#enc-right {
  flex: 1;
  background: linear-gradient(170deg, #110e08 0%, #0e0b06 100%);
  border: 1px solid #221608;
  border-left: none;
  display: flex;
  overflow: hidden;
  position: relative;
}
/* Stacked pages — right side */
#enc-right::before {
  content: '';
  position: absolute;
  right: -5px; top: 4px; bottom: -4px; width: 5px;
  background: #0a0703;
  border-right: 1px solid #180f03;
  z-index: 0;
}
#enc-right::after {
  content: '';
  position: absolute;
  right: -9px; top: 8px; bottom: -8px; width: 4px;
  background: #060401;
  border-right: 1px solid #100802;
  z-index: 0;
}

/* ── Content column ── */
#enc-content-col {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#enc-content-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 22px 24px 18px;
  background-image: repeating-linear-gradient(
    transparent, transparent 27px,
    rgba(201,162,39,0.02) 27px,
    rgba(201,162,39,0.02) 28px
  );
  background-attachment: local;
}
#enc-content-scroll::-webkit-scrollbar { width: 4px; }
#enc-content-scroll::-webkit-scrollbar-thumb { background: #221408; }

/* page-turn animations */
@keyframes enc-next {
  0%   { opacity:1; transform:translateX(0) scale(1); }
  35%  { opacity:0; transform:translateX(-14px) scale(0.99); }
  65%  { opacity:0; transform:translateX(14px) scale(0.99); }
  100% { opacity:1; transform:translateX(0) scale(1); }
}
@keyframes enc-prev {
  0%   { opacity:1; transform:translateX(0) scale(1); }
  35%  { opacity:0; transform:translateX(14px) scale(0.99); }
  65%  { opacity:0; transform:translateX(-14px) scale(0.99); }
  100% { opacity:1; transform:translateX(0) scale(1); }
}
.enc-anim-next { animation: enc-next 0.3s cubic-bezier(0.4,0,0.2,1) both; }
.enc-anim-prev { animation: enc-prev 0.3s cubic-bezier(0.4,0,0.2,1) both; }

/* ── Footer nav ── */
#enc-footer-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-top: 1px solid #1c1207;
  flex-shrink: 0;
  gap: 8px;
}
.enc-nav-btn {
  font-family: var(--font-main);
  font-size: 7px;
  color: #3a2510;
  background: transparent;
  border: 1px solid #221508;
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: color 0.15s, border-color 0.15s;
}
.enc-nav-btn:hover:not(:disabled) {
  color: var(--enc-col);
  border-color: var(--enc-col);
}
.enc-nav-btn:disabled { opacity: 0.2; cursor: default; }
#enc-page-info {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  color: #2c1e08;
  letter-spacing: 2px;
  text-align: center;
  flex: 1;
  transition: color 0.25s;
}

/* ── Section tabs strip ── */
#enc-tabs-strip {
  flex: 0 0 32px;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #1c1207;
  padding: 18px 0 0;
  gap: 2px;
  background: #0b0905;
  z-index: 1;
}
.enc-tab-btn {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-family: var(--font-main);
  font-size: 5px;
  letter-spacing: 2.5px;
  padding: 14px 9px;
  cursor: pointer;
  background: transparent;
  border: none;
  border-right: 2px solid transparent;
  color: #2c1808;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  white-space: nowrap;
  line-height: 1;
}
.enc-tab-btn:hover { color: #6a4a28; background: rgba(255,255,255,0.02); }
.enc-tab-btn.active {
  color: var(--enc-col);
  border-right-color: var(--enc-col);
  background: rgba(255,255,255,0.03);
}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.enc-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 50px 20px;
  text-align: center;
  min-height: 200px;
}
.enc-empty-icon { font-size: 26px; color: #1e1208; }
.enc-empty-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  color: #2a1a08;
  letter-spacing: 3px;
}
.enc-empty-sub { font-size: 5.5px; color: #1a1006; letter-spacing: 1.5px; }

/* ============================================================
   DECORATIVE HELPERS
   ============================================================ */
.enc-entry-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(11px, 1.3vw, 16px);
  letter-spacing: 3px;
  margin-bottom: 4px;
  line-height: 1.3;
}
.enc-entry-divider {
  height: 1px;
  margin-bottom: 12px;
  opacity: 0.35;
}
.enc-section-label {
  font-size: 5.5px;
  letter-spacing: 3px;
  border-bottom: 1px solid #1e1208;
  padding-bottom: 5px;
  margin: 14px 0 8px;
  color: inherit;
  opacity: 0.55;
}
.enc-body-text {
  font-size: 7px;
  color: #5a4428;
  line-height: 1.9;
  letter-spacing: 0.3px;
  font-family: 'Cinzel', serif;
}
.enc-badge {
  display: inline-block;
  font-size: 5.5px;
  letter-spacing: 2px;
  padding: 3px 9px;
  border: 1px solid;
}
.enc-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.enc-entry-actions {
  display: flex;
  gap: 6px;
  padding-top: 10px;
  border-top: 1px solid #1a1005;
  margin-top: 14px;
}

/* ============================================================
   CHARACTERS
   ============================================================ */
.enc-char-layout {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  margin-bottom: 14px;
}
.enc-char-portrait-col { flex: 0 0 96px; }
.enc-char-portrait-frame {
  width: 96px;
  height: 124px;
  border: 1px solid #2a1a08;
  overflow: hidden;
  background: #0a0703;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  margin-bottom: 0;
}
.enc-char-portrait-frame img { width:100%; height:100%; object-fit:cover; display:block; }
.enc-char-portrait-ph { font-size: 22px; color: #2a1808; }
.enc-char-color-band {
  height: 4px;
  width: 96px;
  margin-top: 3px;
}
.enc-char-info-col { flex: 1; min-width: 0; }
.enc-char-stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  margin-bottom: 10px;
}
.enc-stat-box {
  background: #090703;
  border: 1px solid #1c1106;
  padding: 6px 3px;
  text-align: center;
}
.enc-stat-lbl { font-size: 4.5px; color: #2c1e08; letter-spacing: 1px; margin-bottom: 4px; }
.enc-stat-val { font-size: 8px; letter-spacing: 0; }
.enc-char-tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}
.enc-char-tag {
  font-size: 5.5px;
  color: #5a4020;
  border: 1px solid #2a1808;
  padding: 3px 8px;
  letter-spacing: 0.5px;
  background: #090703;
}
.enc-char-ability-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  background: #090703;
  border: 1px solid #1a1005;
  margin-bottom: 4px;
}
.enc-char-ability-icon { font-size: 9px; flex-shrink: 0; }
.enc-char-ability-name { font-size: 6px; color: #6a5030; letter-spacing: 0.5px; flex: 1; }
.enc-char-ability-type { font-size: 5px; color: #2c1e08; letter-spacing: 1px; }
.enc-char-passive-row {
  font-size: 6.5px;
  color: #4a3820;
  padding: 5px 0 5px 12px;
  border-left: 2px solid #2a1808;
  margin-bottom: 5px;
  font-family: 'Cinzel', serif;
  line-height: 1.7;
}
.enc-char-passive-row::before { content: '◆ '; color: #3a2810; font-size: 5px; }
.enc-char-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.enc-info-field { }
.enc-info-lbl { font-size: 5px; color: #2c1e08; letter-spacing: 2px; margin-bottom: 2px; }
.enc-info-val { font-size: 6.5px; color: #5a4428; letter-spacing: 0.5px; }

/* ============================================================
   PLACES
   ============================================================ */
.enc-place-img {
  width: 100%;
  max-height: 180px;
  object-fit: cover;
  display: block;
  border: 1px solid #2a1808;
  margin-bottom: 14px;
}
.enc-soundtrack-item {
  border: 1px solid #1e1208;
  overflow: hidden;
  margin-bottom: 6px;
}
.enc-soundtrack-hd {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  cursor: pointer;
  background: #090703;
  transition: background 0.1s;
}
.enc-soundtrack-hd:hover { background: #0e0b06; }
.enc-soundtrack-icon { font-size: 9px; flex-shrink: 0; }
.enc-soundtrack-lbl { flex:1; font-size: 6.5px; color: #5a4428; letter-spacing: 0.3px; }
.enc-soundtrack-toggle { font-size: 6px; color: #2c1e08; }
.enc-soundtrack-embed { display:none; width:100%; aspect-ratio:16/9; }
.enc-soundtrack-embed.open { display:block; }
.enc-soundtrack-embed iframe { width:100%; height:100%; border:none; display:block; }

/* ============================================================
   STATUS EFFECTS
   ============================================================ */
.enc-status-top {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.enc-status-orb {
  width: 40px; height: 40px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 0 16px var(--status-col, #888);
}
.enc-status-orb::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.28), transparent 65%);
}
.enc-stars-display {
  display: flex;
  gap: 4px;
  margin: 8px 0 12px;
}
.enc-star { font-size: 13px; }
.enc-star.empty { opacity: 0.12; }

/* ============================================================
   MEMORIES
   ============================================================ */
.enc-memory-cover {
  width: 100%;
  max-height: 150px;
  object-fit: cover;
  display: block;
  border: 1px solid #2a1808;
  margin-bottom: 14px;
}
.enc-chapter-label {
  font-size: 5.5px;
  letter-spacing: 4px;
  color: #e76f51;
  opacity: 0.55;
  margin-bottom: 3px;
}
.enc-scenes { display: flex; flex-direction: column; gap: 16px; margin-top: 4px; }
.enc-scene {
  border-left: 2px solid #2a1808;
  padding-left: 14px;
  position: relative;
}
.enc-scene::before {
  content: '◆';
  position: absolute;
  left: -5px; top: 1px;
  font-size: 6px;
  color: #e76f51;
  opacity: 0.45;
}
.enc-scene-title { font-size: 6.5px; color: #e76f51; letter-spacing: 1px; margin-bottom: 6px; opacity: 0.8; }
.enc-scene-text {
  font-size: 7px;
  color: #5a4428;
  line-height: 1.9;
  letter-spacing: 0.3px;
  font-family: 'Cinzel', serif;
  white-space: pre-wrap;
}
.enc-scene-btns { display:flex; gap:5px; margin-top:7px; }
.enc-scene-btns .btn { font-size:5.5px; padding:3px 8px; }
.enc-add-scene-bar {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed #1e1208;
  display: flex;
  gap: 6px;
}
.enc-scene-form {
  background: #090703;
  border: 1px solid #2a1808;
  padding: 12px;
  margin-top: 10px;
}
.enc-scene-form-field { margin-bottom: 8px; }
.enc-scene-form-field label { display:block; font-size:6px; color:#2c1e08; letter-spacing:2px; margin-bottom:4px; }
.enc-scene-form-field input,
.enc-scene-form-field textarea {
  width: 100%;
  background: #060402;
  border: 1px solid #1e1208;
  color: #8a7050;
  font-family: var(--font-main);
  font-size: 7px;
  padding: 7px 9px;
  outline: none;
  line-height: 1.6;
  box-sizing: border-box;
  letter-spacing: 0.4px;
}
.enc-scene-form-field input:focus,
.enc-scene-form-field textarea:focus { border-color: var(--enc-col); }
.enc-scene-form-field textarea { resize: vertical; min-height: 90px; }
.enc-scene-form-btns { display:flex; gap:6px; justify-content:flex-end; }

/* ============================================================
   MODALS
   ============================================================ */
.enc-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 10010;
  align-items: center;
  justify-content: center;
}
.enc-overlay.open { display: flex; }
.enc-modal {
  background: #0c0905;
  border: 1px solid #2a1808;
  border-top: 2px solid var(--enc-col);
  width: min(660px, 96vw);
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 60px rgba(0,0,0,0.97), 0 0 0 1px #180f03;
}
.enc-modal-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 18px;
  border-bottom: 1px solid #1e1208;
  flex-shrink: 0;
}
.enc-modal-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  color: var(--enc-col);
  letter-spacing: 3px;
  transition: color 0.25s;
}
.enc-modal-body {
  padding: 16px 18px;
  overflow-y: auto;
  flex: 1;
}
.enc-modal-body::-webkit-scrollbar { width: 4px; }
.enc-modal-body::-webkit-scrollbar-thumb { background: #2a1808; }
.enc-modal-ft {
  padding: 10px 18px;
  border-top: 1px solid #1e1208;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-shrink: 0;
  background: #090703;
}
.enc-field { margin-bottom: 11px; }
.enc-field label {
  display: block;
  font-size: 6px;
  color: #2c1e08;
  letter-spacing: 2px;
  margin-bottom: 5px;
}
.enc-field input[type="text"],
.enc-field input[type="url"],
.enc-field textarea,
.enc-field select {
  width: 100%;
  background: #070502;
  border: 1px solid #1e1208;
  color: #8a7050;
  font-family: var(--font-main);
  font-size: 7px;
  padding: 8px 10px;
  outline: none;
  line-height: 1.6;
  letter-spacing: 0.4px;
  box-sizing: border-box;
  transition: border-color 0.15s;
}
.enc-field input:focus, .enc-field textarea:focus, .enc-field select:focus {
  border-color: var(--enc-col);
}
.enc-field textarea { resize: none; }
.enc-field select { appearance: none; cursor: pointer; }
.enc-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.enc-three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* ── Image preview ── */
.enc-img-preview {
  width: 100%;
  aspect-ratio: 16/6;
  background: #060402;
  border: 1px dashed #1e1208;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-top: 6px;
}
.enc-img-preview img { width:100%; height:100%; object-fit:cover; }
.enc-img-no-label { font-size: 6.5px; color: #1e1208; letter-spacing: 2px; }

/* ── Star picker ── */
.enc-star-picker { display:flex; gap:5px; margin-top:3px; }
.enc-star-pick {
  font-size: 16px;
  color: #2a1808;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 2px;
  transition: color 0.1s, transform 0.1s;
  line-height: 1;
}
.enc-star-pick.lit { color: #c9a227; }
.enc-star-pick:hover { transform: scale(1.2); }

/* ── Color presets ── */
.enc-color-presets {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 7px;
}
.enc-color-swatch {
  width: 20px; height: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.12s;
}
.enc-color-swatch:hover { transform: scale(1.25); box-shadow: 0 0 7px currentColor; }

/* ── Soundtrack rows in form ── */
.enc-st-row {
  display: flex;
  gap: 5px;
  margin-bottom: 5px;
  align-items: stretch;
}
.enc-st-row input {
  flex: 1;
  min-width: 0;
  background: #070502;
  border: 1px solid #1e1208;
  color: #8a7050;
  font-family: var(--font-main);
  font-size: 6.5px;
  padding: 6px 8px;
  outline: none;
  box-sizing: border-box;
}
.enc-st-row input:focus { border-color: var(--enc-col); }
.enc-st-lbl { width: 110px; }

/* ── Confirm ── */
#enc-confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 10020;
  align-items: center;
  justify-content: center;
}
#enc-confirm-overlay.open { display: flex; }
#enc-confirm-box {
  background: #0c0905;
  border: 1px solid #2a1808;
  padding: 26px 28px;
  text-align: center;
  max-width: 300px;
  box-shadow: 0 0 40px rgba(0,0,0,0.95);
}
#enc-confirm-msg { font-size: 7.5px; color: #7a6040; letter-spacing: 1px; margin-bottom: 16px; line-height: 1.7; }
#enc-confirm-btns { display:flex; gap:10px; justify-content:center; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 700px) {
  body { overflow: auto; }
  #enc-book { flex-direction: column; height: auto; min-height: 0; }
  #enc-left { flex: 0 0 auto; max-width: 100%; min-height: 0; max-height: 220px; }
  #enc-spine { flex: 0 0 12px; flex-direction: row; writing-mode: horizontal-tb; }
  .enc-spine-lbl { writing-mode: horizontal-tb; letter-spacing: 4px; }
  #enc-right { flex: 1; min-height: 400px; }
  #enc-tabs-strip { flex-direction: row; flex: 0 0 auto; border-left: none; border-top: 1px solid #1c1207; padding: 0 10px; }
  .enc-tab-btn { writing-mode: horizontal-tb; transform: none; padding: 8px 10px; border-right: none; border-bottom: 2px solid transparent; }
  .enc-tab-btn.active { border-bottom-color: var(--enc-col); border-right-color: transparent; }
  #enc-content-col { flex-direction: column; }
}

</style>
</head>
<body>

<div id="cursor">
  <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;">
    <polygon points="2,1 2,17 6,13 9,19 12,17 9,11 15,11" fill="white"/>
    <polygon points="2,1 2,17 6,13 9,19 12,17 9,11 15,11" fill="none" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>
</div>
<div id="notif"></div>

<!-- ── Masthead ── -->
<div id="enc-masthead">
  <button class="btn" onclick="location.href='index.html'">&lt; BACK</button>
  <div id="enc-title-block">
    <div class="enc-main-title">ENCYCLOPÆDIA</div>
    <div class="enc-main-sub">CODEX OF THE REALM</div>
    <div class="enc-masthead-deco">
      <div class="enc-masthead-deco-line"></div>
      <span class="enc-masthead-deco-gem">✦</span>
      <div class="enc-masthead-deco-line r"></div>
    </div>
  </div>
  <div style="width:80px;"></div><!-- balance back button -->
</div>

<!-- ── Book ── -->
<div id="enc-book-wrap">
  <div id="enc-book">

    <!-- LEFT PAGE -->
    <div id="enc-left">
      <div id="enc-left-hd">
        <div class="enc-idx-label" id="enc-idx-label">CHARACTERS</div>
        <div class="enc-idx-sub" id="enc-idx-sub">INDEX &amp; TABLE OF CONTENTS</div>
      </div>
      <div id="enc-toc"></div>
      <div id="enc-left-ft">
        <div id="enc-left-ft-content"></div>
      </div>
    </div>

    <!-- SPINE -->
    <div id="enc-spine">
      <div class="enc-spine-lbl">CODEX</div>
    </div>

    <!-- RIGHT PAGE -->
    <div id="enc-right">
      <div id="enc-content-col">
        <div id="enc-content-scroll">
          <div id="enc-content"></div>
        </div>
        <div id="enc-footer-nav">
          <button class="enc-nav-btn" id="enc-prev-btn" onclick="encNav('prev')" disabled>&#8592; PREV</button>
          <div id="enc-page-info">— —</div>
          <button class="enc-nav-btn" id="enc-next-btn" onclick="encNav('next')" disabled>NEXT &#8594;</button>
        </div>
      </div>
      <!-- Section tabs -->
      <div id="enc-tabs-strip">
        <button class="enc-tab-btn active" data-section="characters" onclick="switchSection('characters')">⚔ CHARACTERS</button>
        <button class="enc-tab-btn" data-section="places"     onclick="switchSection('places')">◈ PLACES</button>
        <button class="enc-tab-btn" data-section="statuses"   onclick="switchSection('statuses')">✦ STATUS FX</button>
        <button class="enc-tab-btn" data-section="memories"   onclick="switchSection('memories')">✦ MEMORIES</button>
      </div>
    </div>

  </div>
</div>

<!-- ============================================================
     PLACE EDITOR MODAL
     ============================================================ -->
<div class="enc-overlay" id="enc-place-overlay">
  <div class="enc-modal">
    <div class="enc-modal-hd">
      <span class="enc-modal-title" id="enc-place-modal-title">NEW PLACE</span>
      <button class="btn icon-btn" onclick="closePlaceModal()">&times;</button>
    </div>
    <div class="enc-modal-body">
      <div class="enc-two-col">
        <div class="enc-field">
          <label>NAME *</label>
          <input type="text" id="ep-name" placeholder="e.g. The Shattered Spire" maxlength="80"/>
        </div>
        <div class="enc-field">
          <label>REGION / AREA</label>
          <input type="text" id="ep-region" placeholder="e.g. Northern Wastes" maxlength="60"/>
        </div>
      </div>
      <div class="enc-field">
        <label>TYPE</label>
        <select id="ep-type">
          <option value="CITY">CITY</option>
          <option value="DUNGEON">DUNGEON</option>
          <option value="WILDERNESS">WILDERNESS</option>
          <option value="LANDMARK">LANDMARK</option>
          <option value="REALM">REALM</option>
          <option value="RUIN">RUIN</option>
          <option value="VOID">VOID</option>
          <option value="OTHER">OTHER</option>
        </select>
      </div>
      <div class="enc-field">
        <label>DESCRIPTION</label>
        <textarea id="ep-desc" rows="3" placeholder="What does this place look like? What feeling does it give?"></textarea>
      </div>
      <div class="enc-field">
        <label>LORE &amp; HISTORY</label>
        <textarea id="ep-lore" rows="3" placeholder="The history, myths, and significance of this place..."></textarea>
      </div>
      <div class="enc-field">
        <label>NOTABLE FEATURES</label>
        <textarea id="ep-features" rows="2" placeholder="Landmarks, hazards, unique properties..."></textarea>
      </div>
      <div class="enc-field">
        <label style="display:flex;justify-content:space-between;align-items:center;">
          IMAGE <span style="cursor:pointer;color:var(--enc-col)" onclick="document.getElementById('ep-img-file').click()">[UPLOAD]</span>
          <input type="file" id="ep-img-file" accept="image/*" style="display:none" onchange="handleEncImgUpload('place',event)"/>
        </label>
        <div class="enc-img-preview" id="ep-img-preview">
          <span class="enc-img-no-label">NO IMAGE</span>
        </div>
        <button class="btn sm" id="ep-img-clear" style="margin-top:5px;display:none" type="button" onclick="clearEncImg('place')">✕ CLEAR</button>
      </div>
      <div class="enc-field">
        <label>SOUNDTRACKS <span style="opacity:0.4;font-size:5.5px">(YOUTUBE LINKS)</span></label>
        <div id="ep-soundtracks-list"></div>
        <button class="btn sm" type="button" onclick="addSoundtrackRow()">+ ADD TRACK</button>
      </div>
    </div>
    <div class="enc-modal-ft">
      <button class="btn" onclick="closePlaceModal()">CANCEL</button>
      <button class="btn accent" onclick="savePlaceModal()">SAVE PLACE</button>
    </div>
  </div>
</div>

<!-- ============================================================
     STATUS EDITOR MODAL
     ============================================================ -->
<div class="enc-overlay" id="enc-status-overlay">
  <div class="enc-modal">
    <div class="enc-modal-hd">
      <span class="enc-modal-title" id="enc-status-modal-title">NEW STATUS EFFECT</span>
      <button class="btn icon-btn" onclick="closeStatusModal()">&times;</button>
    </div>
    <div class="enc-modal-body">
      <div class="enc-two-col">
        <div class="enc-field">
          <label>NAME *</label>
          <input type="text" id="es-name" placeholder="e.g. Burning" maxlength="60"/>
        </div>
        <div class="enc-field">
          <label>TYPE</label>
          <select id="es-type">
            <option value="DEBUFF">DEBUFF</option>
            <option value="BUFF">BUFF</option>
            <option value="NEUTRAL">NEUTRAL</option>
            <option value="PASSIVE">PASSIVE</option>
            <option value="UNIQUE">UNIQUE</option>
          </select>
        </div>
      </div>
      <div class="enc-field">
        <label>COLOR</label>
        <input type="color" id="es-color" value="#ff4444" style="width:48px;height:28px;border:1px solid #2a1808;background:#0a0703;cursor:pointer;padding:2px;"/>
        <div class="enc-color-presets">
          <div class="enc-color-swatch" style="background:#ff4444" onclick="document.getElementById('es-color').value='#ff4444'"></div>
          <div class="enc-color-swatch" style="background:#ff8844" onclick="document.getElementById('es-color').value='#ff8844'"></div>
          <div class="enc-color-swatch" style="background:#ffff44" onclick="document.getElementById('es-color').value='#ffff44'"></div>
          <div class="enc-color-swatch" style="background:#44ff88" onclick="document.getElementById('es-color').value='#44ff88'"></div>
          <div class="enc-color-swatch" style="background:#44aaff" onclick="document.getElementById('es-color').value='#44aaff'"></div>
          <div class="enc-color-swatch" style="background:#aa44ff" onclick="document.getElementById('es-color').value='#aa44ff'"></div>
          <div class="enc-color-swatch" style="background:#ff44aa" onclick="document.getElementById('es-color').value='#ff44aa'"></div>
          <div class="enc-color-swatch" style="background:#aaaaaa" onclick="document.getElementById('es-color').value='#aaaaaa'"></div>
          <div class="enc-color-swatch" style="background:#ffffff" onclick="document.getElementById('es-color').value='#ffffff'"></div>
          <div class="enc-color-swatch" style="background:#00ffff" onclick="document.getElementById('es-color').value='#00ffff'"></div>
          <div class="enc-color-swatch" style="background:#cc99ff" onclick="document.getElementById('es-color').value='#cc99ff'"></div>
          <div class="enc-color-swatch" style="background:#00ff80" onclick="document.getElementById('es-color').value='#00ff80'"></div>
        </div>
      </div>
      <div class="enc-field">
        <label>SEVERITY (STARS)</label>
        <div class="enc-star-picker" id="es-stars-picker">
          <button class="enc-star-pick" data-v="1" type="button" onclick="pickStar(1)">★</button>
          <button class="enc-star-pick" data-v="2" type="button" onclick="pickStar(2)">★</button>
          <button class="enc-star-pick" data-v="3" type="button" onclick="pickStar(3)">★</button>
          <button class="enc-star-pick" data-v="4" type="button" onclick="pickStar(4)">★</button>
          <button class="enc-star-pick" data-v="5" type="button" onclick="pickStar(5)">★</button>
        </div>
        <input type="hidden" id="es-stars" value="1"/>
      </div>
      <div class="enc-field">
        <label>EFFECT DESCRIPTION</label>
        <textarea id="es-desc" rows="4" placeholder="What does this status do? Include mechanics, damage, stat changes..."></textarea>
      </div>
      <div class="enc-field">
        <label>DURATION</label>
        <input type="text" id="es-duration" placeholder="e.g. 3 turns, until healed, permanent" maxlength="80"/>
      </div>
    </div>
    <div class="enc-modal-ft">
      <button class="btn" onclick="closeStatusModal()">CANCEL</button>
      <button class="btn accent" onclick="saveStatusModal()">SAVE STATUS</button>
    </div>
  </div>
</div>

<!-- ============================================================
     MEMORY EDITOR MODAL
     ============================================================ -->
<div class="enc-overlay" id="enc-memory-overlay">
  <div class="enc-modal">
    <div class="enc-modal-hd">
      <span class="enc-modal-title" id="enc-memory-modal-title">NEW CHAPTER</span>
      <button class="btn icon-btn" onclick="closeMemoryModal()">&times;</button>
    </div>
    <div class="enc-modal-body">
      <div class="enc-field">
        <label>CHAPTER TITLE *</label>
        <input type="text" id="em-title" placeholder="e.g. The Night of Falling Stars" maxlength="100"/>
      </div>
      <div class="enc-two-col">
        <div class="enc-field">
          <label>ARC / SAGA</label>
          <input type="text" id="em-arc" placeholder="e.g. Arc I — The Beginning" maxlength="80"/>
        </div>
        <div class="enc-field">
          <label>IN-UNIVERSE DATE</label>
          <input type="text" id="em-date" placeholder="e.g. Year 302, 3rd Moon" maxlength="60"/>
        </div>
      </div>
      <div class="enc-field">
        <label style="display:flex;justify-content:space-between;align-items:center;">
          COVER IMAGE <span style="opacity:0.4;font-size:5.5px">(optional)</span>
          <span style="cursor:pointer;color:var(--enc-col)" onclick="document.getElementById('em-img-file').click()">[UPLOAD]</span>
          <input type="file" id="em-img-file" accept="image/*" style="display:none" onchange="handleEncImgUpload('memory',event)"/>
        </label>
        <div class="enc-img-preview" id="em-img-preview">
          <span class="enc-img-no-label">NO IMAGE</span>
        </div>
        <button class="btn sm" id="em-img-clear" style="margin-top:5px;display:none" type="button" onclick="clearEncImg('memory')">✕ CLEAR</button>
      </div>
    </div>
    <div class="enc-modal-ft">
      <button class="btn" onclick="closeMemoryModal()">CANCEL</button>
      <button class="btn accent" onclick="saveMemoryModal()">SAVE CHAPTER</button>
    </div>
  </div>
</div>

<!-- ── Confirm ── -->
<div id="enc-confirm-overlay">
  <div id="enc-confirm-box">
    <div id="enc-confirm-msg">ARE YOU SURE?</div>
    <div id="enc-confirm-btns">
      <button class="btn danger" id="enc-confirm-yes">DELETE</button>
      <button class="btn" id="enc-confirm-no">CANCEL</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="encyclopedia.js?v=1"></script>
</body>
</html>
