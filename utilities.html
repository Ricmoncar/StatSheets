<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STATSHEETS - UTILITIES</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css?v=3">
<style>
  body { padding: 40px; }
  .back-btn { margin-bottom: 30px; }
</style>
</head>
<body>

<div id="cursor">
  <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;">
    <polygon points="2,1 2,17 6,13 9,19 12,17 9,11 15,11" fill="white"/>
    <polygon points="2,1 2,17 6,13 9,19 12,17 9,11 15,11" fill="none" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>
</div>

<div id="notif"></div>
<div id="dice-overlay" onclick="dismissDice()"></div>

<!-- Confirm dialog -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <p id="confirm-msg"></p>
    <div id="confirm-btns">
      <button class="btn danger" id="confirm-yes">YES</button>
      <button class="btn" id="confirm-no">NO</button>
    </div>
  </div>
</div>

<!-- Power Level Info Modal -->
<div id="power-modal-overlay" onclick="closePowerModal()"></div>
<div id="power-modal">
  <div class="panel">
    <div class="panel-title" style="display:flex; justify-content:space-between; align-items:center;">
      POWER LEVEL REFERENCE
      <button class="btn icon-btn" onclick="closePowerModal()">&times;</button>
    </div>
    <div class="pl-content">
      <div class="pl-tier" data-tooltip="The standard limit for common entities.">Human / Small Building</div>
      <div class="pl-tier" data-tooltip="Powerful enough to destroy large structures.">Large Building / City Block</div>
      <div class="pl-tier" data-tooltip="Capable of wiping out an entire town.">Town Level</div>
      <div class="pl-tier" data-tooltip="Devastating force capable of leveling a city.">City Level</div>
      <div class="pl-tier" data-tooltip="True terror. Can erase a mountain from the map.">Mountain Level</div>
    </div>
    <div class="pl-cap">-- ASCENDED TIER --</div>
  </div>
</div>

<div class="back-btn">
  <button class="btn accent" onclick="location.href='index.html'">&lt; BACK TO MAIN MENU</button>
</div>

<div id="utilities-page">
  <div class="editor-title">UTILITIES & TOOLS</div>

  <!-- TOP ROW: Dice+Crit (left) | Tier List (right, full height) -->
  <div class="editor-grid" style="align-items: stretch;">

    <!-- LEFT: DICE & CRIT -->
    <div style="display:flex; flex-direction:column; gap:20px;">
      <div class="panel">
        <div class="panel-title">DICE ROLLER</div>
        <div class="field">
          <label>SIDES</label>
          <input type="number" id="u-dice-sides" value="20" min="2" max="999"/>
        </div>
        <div class="dice-result-wrap">
          <div class="dice-container">
            <div id="dice-cube" class="cube">
              <div class="face front" id="f-front">--</div>
              <div class="face back" id="f-back"></div>
              <div class="face right" id="f-right"></div>
              <div class="face left" id="f-left"></div>
              <div class="face top" id="f-top"></div>
              <div class="face bottom" id="f-bottom"></div>
            </div>
          </div>
          <button class="btn accent" onclick="rollDice()">ROLL DICE</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">CRIT CALCULATOR</div>
        <div class="field">
          <label>CRIT CHANCE (%)</label>
          <input type="number" id="u-crit-chance" value="10" min="0" max="100"/>
        </div>
        <div class="field">
          <label>EXTRA CRIT DMG (MULT)</label>
          <input type="number" id="u-crit-extra" value="1" min="1" step="0.1"/>
        </div>
        <div class="dice-result-wrap">
          <div id="crit-result">--</div>
          <button class="btn accent" onclick="rollCrit()">ROLL CRIT</button>
        </div>
        <div id="crit-detail" style="font-size:8px; color:#555; text-align:center; margin-top:10px;"></div>
      </div>
    </div>

    <!-- RIGHT: TIER LIST (stretches to match left column height) -->
    <div class="panel" style="display:flex; flex-direction:column;">
      <div class="panel-title">TIER LIST</div>
      <div id="tier-list-wrap" style="flex:1; overflow-y:auto;"></div>
    </div>

  </div><!-- /editor-grid -->

  <!-- BELOW: STAT CHECKER -->
  <div class="panel stats-panel" style="margin-top:24px;">
    <div class="panel-title">STAT CHECKER (SIMULATOR)</div>
    <div id="stat-checker-rows">
      <!-- Injected via JS -->
    </div>
  </div>

  <!-- STAT LEADERBOARD -->
  <div class="panel" style="margin-top:24px;">
    <div class="panel-title">STAT LEADERBOARD</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;">
      <button class="btn sm lb-stat-btn accent" onclick="selectLeaderboardStat('avg',this)">BALANCED</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('hp',this)">HP</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('atk',this)">ATK</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('def',this)">DEF</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('mag',this)">MAG</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('spd',this)">SPD</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('heal_pow',this)">HEAL</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('crit_rate',this)">CRIT%</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('crit_dmg',this)">CRIT DMG</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('status_res',this)">STATUS RES</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('dexterity',this)">DEX</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('resilience',this)">RESIL</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('true_dmg',this)">TRUE DMG</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('lifesteal',this)">LIFESTEAL</button>
      <button class="btn sm lb-stat-btn" onclick="selectLeaderboardStat('cooldown_red',this)">CDR</button>
    </div>
    <div id="leaderboard-wrap"></div>
  </div>

  <!-- SUGGESTION BOX -->
  <div class="panel" style="margin-top:24px;">
    <div class="panel-title">SUGGESTION BOX</div>
    <div class="field">
      <label>YOUR SUGGESTION</label>
      <textarea id="suggestion-text" rows="4" placeholder="Type your suggestion here..." style="width:100%; background:#111; color:#eee; border:1px solid #333; padding:8px; font-family:inherit; font-size:8px; resize:vertical; box-sizing:border-box;"></textarea>
    </div>
    <div style="display:flex; gap:8px; align-items:center; margin-top:8px;">
      <button class="btn accent" onclick="submitSuggestion()">SUBMIT</button>
      <span id="suggestion-status" style="font-size:8px; color:#555;"></span>
    </div>
    <div id="suggestion-list" style="margin-top:16px;"></div>
  </div>

</div><!-- /utilities-page -->

<div id="global-tooltip"></div>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="script.js?v=3"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('suggestion-list')) loadSuggestions();
    initTierList();
  });
</script>
</body>
</html>
